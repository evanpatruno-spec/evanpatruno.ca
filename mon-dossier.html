<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Portail Client | Evan Patruno</title>

    <!-- PWA CONFIG -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a0516">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EP Portail">
    <link rel="apple-touch-icon" href="/pwa-icon-512.png">

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dash-primary: #873276;
            --dash-primary-glow: rgba(135, 50, 118, 0.4);
            --dash-accent: #d4af37;
            --dash-accent-glow: rgba(212, 175, 55, 0.4);
            --dash-bg: #1a0516;
            --dash-card-bg: rgba(255, 255, 255, 0.04);
            --dash-border: rgba(135, 50, 118, 0.6);
            --dash-glow: 0 0 25px rgba(135, 50, 118, 0.4);
            --dash-success: #2ecc71;
            --dash-warning: #f1c40f;
        }

        /* RESET & BASE */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--dash-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* APP NAVBAR */
        .app-nav {
            padding: env(safe-area-inset-top, 20px) 25px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 5, 13, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 10000;
            transition: transform 0.3s ease;
        }

        /* Hide nav when in standalone mode (installed app) */
        @media (display-mode: standalone) {
            .app-nav { display: none; }
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
        }

        .nav-logo img { height: 35px; }
        .nav-logo span span { color: var(--dash-primary); }

        .btn-back-site {
            font-size: 0.75rem;
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-back-site:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        /* PORTAL WRAPPER OVERRIDE */
        .portal-main-wrapper {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            margin: 0 !important;
            min-height: calc(100vh - 80px) !important;
        }

        .portal-container {
            padding-top: 30px !important;
            padding-bottom: 80px !important;
        }
    </style>

    <style>
        .portal-aura { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #000000 0%, var(--dash-bg) 80%); z-index: 1; pointer-events: none; }
        .portal-container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; position: relative; z-index: 5; opacity: 0; transform: translateY(30px); transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1); display: none; }
        .portal-container.visible { opacity: 1; transform: translateY(0); display: block; }
        .portal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 5, 13, 0.95); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 1; transition: 0.5s; }
        .portal-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .section-wrapper { margin-bottom: 25px; border: 1px solid var(--dash-border); border-radius: 40px; overflow: hidden; background: rgba(0, 0, 0, 0.2); transition: 0.4s; box-shadow: var(--dash-glow); }
        .section-header { padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255, 255, 255, 0.03); }
        .section-header h3 { margin: 0; font-family: 'Outfit'; font-size: 1.5rem; color: #fff; }
        .section-chevron { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.1); border-radius: 50%; transition: 0.4s; color: var(--dash-primary); }
        .section-wrapper.collapsed .section-content { max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0; }
        .section-content { padding: 40px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); max-height: 5000px; opacity: 1; overflow: hidden; }
        .login-card { background: rgba(15, 5, 13, 0.95); padding: 50px; border-radius: 40px; border: 2px solid var(--dash-border); box-shadow: var(--dash-glow); text-align: center; width: 100%; max-width: 420px; }
        .login-input { width: 100%; padding: 22px 30px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; color: #fff; font-size: 1.1rem; margin-bottom: 20px; outline: none; text-align: center; }
        .login-btn { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--dash-primary), #b0549c); color: white; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.5s; box-shadow: 0 15px 40px rgba(135, 50, 118, 0.5); }
        .property-card-premium { background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)); border: 1px solid var(--dash-border); border-radius: 45px; padding: 50px; display: flex; gap: 50px; align-items: center; margin-bottom: 60px; box-shadow: var(--dash-glow); }
        .timeline-steps { display: flex; justify-content: space-between; position: relative; padding: 0 40px; gap: 20px; }
        .timeline-steps::before { content: ''; position: absolute; top: 27px; left: 10%; width: 80%; height: 2px; background: rgba(255, 255, 255, 0.08); z-index: 1; }
        .timeline-progress-bar { position: absolute; top: 27px; left: 10%; width: 0%; height: 2px; background: var(--dash-primary); box-shadow: 0 0 20px var(--dash-primary); transition: all 1.8s ease; z-index: 1; }
        .step-node { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100px; flex-shrink: 0; }
        .node-dot { width: 54px; height: 54px; background: var(--dash-bg); border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; transition: all 0.6s ease; }
        .step-node.active .node-dot { border-color: var(--dash-primary); box-shadow: 0 0 16px var(--dash-primary-glow); animation: pulseDot 2.2s infinite; }
        .step-node.completed .node-dot { border-color: var(--dash-success); box-shadow: 0 0 14px rgba(46, 204, 113, 0.4); }
        
        @keyframes pulseDot { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        @media (max-width: 768px) {
            .portal-container { padding: 40px 15px 120px; }
            .timeline-steps { flex-direction: column; padding-left: 20px; }
            .timeline-steps::before { left: 47px; top: 0; width: 2px; height: 100%; }
            .timeline-progress-bar { left: 47px; top: 0; width: 2px; height: 0%; transition: height 1.8s ease; }
            .step-node { flex-direction: row; width: 100%; gap: 20px; padding: 15px 0; }
            .step-label { margin: 0 !important; }
            .property-card-premium { padding: 30px 20px; flex-direction: column; border-radius: 30px; }
            .login-card { padding: 35px 25px; border-radius: 30px; margin: 15px; }
        }

        .milestone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .milestone-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--dash-border); border-radius: 30px; padding: 25px 20px; text-align: center; }
        .milestone-val { font-family: 'Outfit'; font-size: 2.2rem; font-weight: 900; color: #fff; line-height: 1; }
        .milestone-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: var(--dash-accent); letter-spacing: 1px; }

        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .team-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--dash-border); border-radius: 20px; padding: 20px; }
        
        .partner-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .partner-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--dash-border); border-radius: 25px; padding: 25px; position: relative; overflow: hidden; }
        .partner-promo-badge { position: absolute; top: 15px; right: -30px; background: var(--dash-primary); color: #fff; padding: 5px 35px; transform: rotate(45deg); font-size: 0.6rem; font-weight: 900; }
        .copy-btn { background: rgba(135, 50, 118, 0.1); border: 1px dashed var(--dash-primary); color: var(--dash-primary); padding: 8px 15px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }

        .pwa-login-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 16px;
            padding: 14px 20px; background: transparent; border: 1px solid rgba(135, 50, 118, 0.5); border-radius: 50px;
            color: rgba(255,255,255,0.75); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer;
        }

        .install-banner { display: none; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 25px; margin-bottom: 40px; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

    <nav class="app-nav" id="appNav">
        <a href="https://evanpatruno.ca" class="nav-logo">
            <img src="/logo-ep.png" alt="EP">
            <span>EVAN<span>PATRUNO</span></span>
        </a>
        <a href="https://evanpatruno.ca" class="btn-back-site">Site Web</a>
    </nav>

    <div class="portal-main-wrapper">
        <div class="portal-aura"></div>

        <div class="portal-overlay" id="portalOverlay">
            <div class="login-card">
                <h2 style="font-family: 'Outfit'; font-size: 2.2rem; font-weight: 900;">Dossier Privé</h2>
                <p style="opacity: 0.6; margin-bottom: 35px;">Récupérez votre accès sécurisé.</p>
                <form onsubmit="handlePortalLogin(event)">
                    <input type="text" placeholder="CODE DOSSIER (ex: EP-1)" class="login-input" id="inpPortalCode" required>
                    <input type="password" maxlength="4" placeholder="4 CHIFFRES (TEL)" class="login-input" id="inpPortalPhone" required style="margin-top:-10px;">
                    <button type="submit" class="login-btn" id="btnPortalLogin">Ouvrir le dossier</button>
                    <button type="button" class="pwa-login-btn" onclick="installPortalApp()" id="btnPwaLogin">
                        <span class="pwa-icon"></span>
                        <span>Installer l'app sur mon téléphone</span>
                    </button>
                    <div id="loginErrorMsg" style="color:#ff4757; font-size:0.8rem; margin-top:15px; display:none; font-weight:600;"></div>
                </form>
            </div>
        </div>

        <div class="portal-container" id="portalDash">
            <header style="margin-bottom: 40px;">
                <div id="pwaInstallBanner" class="install-banner">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span style="font-size: 2rem;">📱</span>
                        <div>
                            <div style="font-weight: 900; color: #fff;">Vivez l'expérience App</div>
                            <div style="font-size: 0.7rem; opacity: 0.7;">Notifications & suivi en temps réel.</div>
                        </div>
                    </div>
                    <button class="install-btn" onclick="installPortalApp()" style="background:var(--dash-primary); border:none; padding:10px 20px; border-radius:50px; color:#fff; font-weight:900;">INSTALLER</button>
                </div>
                <h1 id="txtWelcome" style="font-family:'Outfit'; font-size: 3rem; margin:0;">--</h1>
                <p id="txtCodeRef" style="opacity:0.5; font-weight:700;">--</p>
            </header>

            <div class="property-card-premium">
                <div style="flex:1;">
                    <span id="badgeStage" style="background:rgba(46,204,113,0.1); color:#2ecc71; padding:5px 15px; border-radius:50px; font-size:0.7rem; font-weight:800; border:1px solid #2ecc71; margin-bottom:15px; display:inline-block;">--</span>
                    <h2 id="txtPropName" style="font-family:'Outfit'; font-size: 2.5rem; margin:0;">--</h2>
                    <p id="txtPropCity" style="opacity:0.5; font-size:1.1rem;">--</p>
                </div>
            </div>

            <div class="milestone-grid" id="wrapMilestones"></div>

            <div class="section-wrapper" id="secTimeline">
                <div class="section-header" onclick="toggleSection('secTimeline')">
                    <h3>Timeline</h3>
                    <div class="section-chevron">▼</div>
                </div>
                <div class="section-content">
                    <div class="timeline-steps" id="wrapTimeline">
                        <div class="timeline-progress-bar" id="barProgress"></div>
                    </div>
                </div>
            </div>

            <div class="section-wrapper collapsed" id="secTeam">
                <div class="section-header" onclick="toggleSection('secTeam')">
                    <h3>Équipe</h3>
                    <div class="section-chevron">▼</div>
                </div>
                <div class="section-content">
                    <div class="team-grid" id="wrapTeam"></div>
                </div>
            </div>

            <div class="section-wrapper collapsed" id="secPartners">
                <div class="section-header" onclick="toggleSection('secPartners')">
                    <h3>Partenaires</h3>
                    <div class="section-chevron">▼</div>
                </div>
                <div class="section-content">
                    <div class="partner-grid" id="wrapPartners"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MOCK_DATA = {
            firstName: "Evan",
            code: "Dossier #EP-1",
            property: "282 rue Bouthillier Nord",
            city: "St-Jean-sur-Richelieu",
            stage: "En cours",
            timeline: [
                { label: "Préparation", icon: "", status: "completed" },
                { label: "Visites", icon: "🔍", status: "completed" },
                { label: "Offre d'achat", icon: "🛡️", status: "active" },
                { label: "Notaire", icon: "✒️", status: "pending" },
                { label: "Remise des clés", icon: "🏠", status: "pending" }
            ],
            milestones: {
                financing: { days: 5, date: "25 Avril 2026" },
                inspection: { days: 12, date: "2 Mai 2026" },
                signature: { days: 25, date: "15 Mai 2026" },
                occupation: { days: 28, date: "18 Mai 2026" }
            },
            team: [
                { role: "Courtier Immob.", name: "Evan Patruno", icon: "🤵", phone: "514-000-0000", email: "evan@patruno.ca" }
            ],
            partners: [
                { name: "Déménageur Expert", icon: "🚚", category: "Déménagement", benefit: "15% de rabais", code: "PATRUNO15" }
            ]
        };

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        async function handlePortalLogin(e) {
            e.preventDefault();
            const code = document.getElementById('inpPortalCode').value.toUpperCase();
            const btn = document.getElementById('btnPortalLogin');
            btn.innerText = "Recherche...";
            
            setTimeout(() => {
                if (code === "EP-1" || code === "EP-1001") {
                    renderPortal(MOCK_DATA);
                    document.getElementById('portalOverlay').classList.add('hidden');
                    document.getElementById('portalDash').classList.add('visible');
                } else {
                    const err = document.getElementById('loginErrorMsg');
                    err.style.display = 'block';
                    err.innerText = "⚠️ Code invalide. Contactez votre courtier.";
                    btn.innerText = "Ouvrir le dossier";
                }
            }, 800);
        }

        function renderPortal(data) {
            document.getElementById('txtWelcome').innerText = `Bienvenue, ${data.firstName}.`;
            document.getElementById('txtCodeRef').innerText = data.code;
            document.getElementById('txtPropName').innerText = data.property;
            document.getElementById('txtPropCity').innerText = data.city;
            document.getElementById('badgeStage').innerText = data.stage;

            const wrapT = document.getElementById('wrapTimeline');
            wrapT.querySelectorAll('.step-node').forEach(n => n.remove());
            let completed = 0;
            data.timeline.forEach((s, i) => {
                const node = document.createElement('div');
                node.className = `step-node ${s.status}`;
                node.innerHTML = `<div class="node-dot">${s.icon}</div><span class="step-label">${s.label}</span>`;
                wrapT.appendChild(node);
                if (s.status === 'completed') completed++;
                if (s.status === 'active') completed += 0.5;
            });
            
            setTimeout(() => {
                const bar = document.getElementById('barProgress');
                const total = data.timeline.length;
                const safePct = total > 1 ? Math.max(0, ((completed - 1) / (total - 1)) * 80) : 0;
                if (window.innerWidth <= 768) {
                    bar.style.height = `${safePct}%`;
                } else {
                    bar.style.width = `${safePct}%`;
                }
            }, 200);

            const m = data.milestones;
            const msConfig = [
                { lab: 'Financement', data: m.financing },
                { lab: 'Inspection', data: m.inspection },
                { lab: 'Signature', data: m.signature },
                { lab: 'Occupation', data: m.occupation }
            ];
            document.getElementById('wrapMilestones').innerHTML = msConfig.map(ms => `
                <div class="milestone-card">
                    <div class="milestone-val">${ms.data ? ms.data.days : '--'}</div>
                    <div class="milestone-label">${ms.lab}</div>
                    <div style="font-size:0.7rem; opacity:0.4; margin-top:5px;">${ms.data ? ms.data.date : ''}</div>
                </div>
            `).join('');

            document.getElementById('wrapTeam').innerHTML = data.team.map(t => `
                <div class="team-card">
                    <div style="font-size:1.5rem;">${t.icon}</div>
                    <div style="color:var(--dash-accent); font-size:0.7rem; font-weight:800;">${t.role}</div>
                    <div style="font-weight:900;">${t.name}</div>
                    <div style="margin-top:10px; font-size:0.8rem; opacity:0.7;">
                        📞 ${t.phone}<br>✉️ ${t.email}
                    </div>
                </div>
            `).join('');

            document.getElementById('wrapPartners').innerHTML = data.partners.map(p => `
                <div class="partner-card">
                    <div class="partner-promo-badge">${p.benefit.split(' ')[0]}</div>
                    <div style="font-size: 1.5rem;">${p.icon}</div>
                    <div style="font-weight:900; margin-top:5px;">${p.name}</div>
                    <div style="font-size:0.8rem; color:var(--dash-accent);">${p.benefit}</div>
                    <button class="copy-btn" onclick="copyPromoCode('${p.code}')">CODE: ${p.code}</button>
                </div>
            `).join('');
        }

        function copyPromoCode(code) {
            navigator.clipboard.writeText(code);
            alert("Code copié !");
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                document.getElementById('inpPortalCode').value = code;
            }
        });

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const banner = document.getElementById('pwaInstallBanner');
            if (banner) banner.style.display = 'flex';
        });

        async function installPortalApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            } else {
                const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                if (isIos) {
                    alert("Appuyez sur Partager ⎋ -> Sur l'écran d'accueil.");
                } else {
                    alert("Menu ⋮ Browser -> Installer / Ajouter.");
                }
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
