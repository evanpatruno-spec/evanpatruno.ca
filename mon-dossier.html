<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Portail Client | Evan Patruno</title>

    <!-- PWA CONFIG -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a0516">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EP Portail">
    <link rel="apple-touch-icon" href="/pwa-icon-512.png">

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box !important;
        }
        :root {
            --dash-primary: #873276;
            --dash-primary-glow: rgba(135, 50, 118, 0.4);
            --dash-accent: #d4af37;
            --dash-accent-glow: rgba(212, 175, 55, 0.4);
            --dash-bg: #1a0516;
            --dash-card-bg: rgba(255, 255, 255, 0.04);
            --dash-border: rgba(135, 50, 118, 0.6);
            --dash-glow: 0 0 25px rgba(135, 50, 118, 0.4);
            --dash-success: #2ecc71;
            --dash-warning: #f1c40f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dash-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* APP NAVBAR */
        .app-nav {
            padding: env(safe-area-inset-top, 20px) 25px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 5, 13, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 10000;
        }

        @media (display-mode: standalone) {
            .app-nav { display: none; }
        }

        .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.1rem; }
        .nav-logo img { height: 35px; }
        .nav-logo span span { color: var(--dash-primary); }

        .btn-back-site { font-size: 0.75rem; text-decoration: none; color: rgba(255,255,255,0.6); font-weight: 700; text-transform: uppercase; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; }

        /* PORTAL WRAPPER STANDALONE */
        .portal-main-wrapper {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            min-height: calc(100vh - 80px) !important;
            position: relative;
            overflow: hidden;
        }
        .portal-main-wrapper * {
            box-sizing: border-box !important;
        }

        .portal-aura { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #000000 0%, var(--dash-bg) 80%); z-index: 1; pointer-events: none; }
        
        /* LOGIN / OVERLAY */
        .portal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 5, 13, 0.95); backdrop-filter: blur(40px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .portal-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-card { background: rgba(15, 5, 13, 0.95); padding: 50px; border-radius: 40px; border: 2px solid var(--dash-border); box-shadow: var(--dash-glow); text-align: center; width: 100%; max-width: 420px; }
        .login-input { 
            width: 100% !important; 
            max-width: 100%;
            padding: 20px 25px !important; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
            color: #fff; 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            outline: none; 
            text-align: center; 
            display: block;
        }
        .login-btn { width: 100%; padding: 22px; background: linear-gradient(135deg, var(--dash-primary), #b0549c); color: white; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.5s; box-shadow: 0 15px 40px rgba(135, 50, 118, 0.5); }
        .pwa-login-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 16px; padding: 14px 20px; background: transparent; border: 1px solid rgba(135, 50, 118, 0.5); border-radius: 50px; color: rgba(255,255,255,0.75); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; }

        @media (max-width: 768px) {
            .login-card { padding: 35px 25px; border-radius: 30px; max-width: 100%; }
        }

        /* INTEGRATION DES STYLES DU SNIPPET */
        .portal-container { max-width: 1100px; margin: 0 auto; padding: 40px 20px 100px; position: relative; z-index: 5; opacity: 0; transform: translateY(30px); transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1); display: none; }
        .portal-container.visible { opacity: 1; transform: translateY(0); display: block; }
        .section-wrapper { margin-bottom: 25px; border: 1px solid var(--dash-border); border-radius: 40px; overflow: hidden; background: rgba(0, 0, 0, 0.2); box-shadow: var(--dash-glow); }
        .section-header { padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255, 255, 255, 0.03); }
        .section-header h3 { margin: 0; font-family: 'Outfit'; font-size: 1.5rem; }
        .section-chevron { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.1); border-radius: 50%; color: var(--dash-primary); transition: 0.4s; }
        .section-wrapper.collapsed .section-content { max-height: 0; padding: 0; opacity: 0; }
        .section-wrapper.collapsed .section-chevron { transform: rotate(-90deg); }
        .section-content { padding: 40px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); max-height: 5000px; overflow: hidden; }
        .property-card-premium { background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)); border: 1px solid var(--dash-border); border-radius: 45px; padding: 50px; margin-bottom: 40px; box-shadow: var(--dash-glow); }
        .milestone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .milestone-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--dash-border); border-radius: 30px; padding: 25px 20px; text-align: center; }
        .milestone-val { font-family: 'Outfit'; font-size: 2.2rem; font-weight: 900; line-height: 1; }
        .milestone-label { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: var(--dash-accent); letter-spacing: 1px; }

        @media (max-width: 768px) {
            .section-header { padding: 20px; }
            .section-content { padding: 20px; }
            .property-card-premium { border-radius: 30px; padding: 30px 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="app-nav" id="appNav">
        <a href="https://evanpatruno.ca" class="nav-logo">
            <img src="/logo.png" alt="EP">
            <span>EVAN<span>PATRUNO</span></span>
        </a>
        <a href="https://evanpatruno.ca" class="btn-back-site">Site Web</a>
    </nav>

    <div class="portal-main-wrapper">
        <div class="portal-aura"></div>

        <div class="portal-overlay" id="portalOverlay">
            <div class="login-card">
                <h2 style="font-family: 'Outfit'; font-size: 2.2rem; font-weight: 900;">AccÃ¨s au Dossier</h2>
                <p style="opacity: 0.6; margin-bottom: 35px;">Authentification sÃ©curisÃ©e requise.</p>
                <form onsubmit="handlePortalLogin(event)">
                    <input type="text" placeholder="CODE DOSSIER (ex: EP-1001)" class="login-input" id="inpPortalCode" required>
                    <input type="password" maxlength="4" placeholder="4 DERNIERS CHIFFRES DU TEL" class="login-input" id="inpPortalPhone" required style="margin-top:-10px;">
                    <button type="submit" class="login-btn" id="btnPortalLogin">Ouvrir mon dossier</button>
                    <button type="button" class="pwa-login-btn" onclick="installPortalApp()" id="btnPwaLogin">
                        <span class="pwa-icon">ðŸ“²</span>
                        <span>Installer l'app sur mon tÃ©lÃ©phone</span>
                    </button>
                    <div id="loginErrorMsg"></div>
                </form>
            </div>
        </div>

        <div class="portal-container" id="portalDash">
            <header style="margin-bottom: 40px;">
                <h1 id="txtWelcome" style="font-family:'Outfit'; font-size: 3rem; margin:0; line-height: 1;">Bienvenue.</h1>
                <p id="txtCodeRef" style="opacity:0.5; font-weight:700; margin-top: 5px;">---</p>
            </header>

            <div class="property-card-premium">
                <span id="badgeStage" style="background:rgba(46,204,113,0.1); color:#2ecc71; padding:5px 15px; border-radius:50px; font-size:0.7rem; font-weight:800; border:1px solid #2ecc71; margin-bottom:15px; display:inline-block; text-transform: uppercase;">EN COURS</span>
                <h2 id="txtPropName" style="font-family:'Outfit'; font-size: 2.5rem; margin:0; line-height: 1.1;">Dossier en attente</h2>
                <p id="txtPropCity" style="opacity:0.5; font-size:1.1rem; margin-top: 5px;">Ville à confirmer</p>
            </div>

            <div class="milestone-grid" id="wrapMilestones"></div>

            <div class="section-wrapper" id="secTimeline">
                <div class="section-header" onclick="toggleSection('secTimeline')">
                    <h3>Votre Progression</h3>
                    <div class="section-chevron">â–¼</div>
                </div>
                <div class="section-content">
                    <div class="timeline-steps" id="wrapTimeline" style="display:flex; justify-content:space-between; position:relative; padding:0 40px; gap:20px;">
                        <div class="timeline-progress-bar" id="barProgress"></div>
                    </div>
                </div>
            </div>

            <div class="section-wrapper collapsed" id="secTeam">
                <div class="section-header" onclick="toggleSection('secTeam')">
                    <h3>Vos Intervenants</h3>
                    <div class="section-chevron">â–¼</div>
                </div>
                <div class="section-content">
                    <div class="team-grid" id="wrapTeam" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px;"></div>
                </div>
            </div>
            
            <div class="section-wrapper collapsed" id="secChecklist">
                <div class="section-header" onclick="toggleSection('secChecklist')">
                    <h3>Checklist Transactionnelle <span id="badgePrequal" style="font-size:0.8rem; background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:50px; margin-left:10px;">0/0</span></h3>
                    <div class="section-chevron">â–¼</div>
                </div>
                <div class="section-content">
                    <div id="wrapChecklist" style="display:grid; grid-template-columns:1fr; gap:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CACHE_VERSION = 'v5';
        
        function toggleSection(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        function setSafeStyle(id, prop, val) {
            const el = document.getElementById(id);
            if (el) el.style[prop] = val;
        }

        async function handlePortalLogin(e) {
            e.preventDefault();
            const code = document.getElementById('inpPortalCode').value.trim();
            const phone = document.getElementById('inpPortalPhone').value.trim();
            const btn = document.getElementById('btnPortalLogin');

            btn.innerText = "VÃ©rification...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/portal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codePortal: code, phoneLast4: phone })
                });

                if (!response.ok) throw new Error("Dossier introuvable");

                const data = await response.json();
                renderPortal(data);
                document.getElementById('portalOverlay').classList.add('hidden');
                document.getElementById('portalDash').classList.add('visible');
            } catch (err) {
                const errorMsg = document.getElementById('loginErrorMsg');
                errorMsg.innerText = "\u26a0\ufe0f " + err.message;
                errorMsg.style.cssText = "color:#ff4757; font-size:0.8rem; margin-top:15px; font-weight:600;";
                btn.innerText = "Ouvrir mon dossier";
                btn.disabled = false;
            }
        }

        function renderPortal(data) {
            if (!data) return;
            document.getElementById('txtWelcome').innerText = `Bienvenue, ${data.firstName || 'Client'}.`;
            document.getElementById('txtCodeRef').innerText = `Dossier #${data.code}`;
            document.getElementById('txtPropName').innerText = data.property || "PropriÃ©tÃ©";
            document.getElementById('txtPropCity').innerText = data.city || "";
            document.getElementById('badgeStage').innerText = data.stage || "EN COURS";

            // Team
            const wrapTeam = document.getElementById('wrapTeam');
            if (wrapTeam) {
                wrapTeam.innerHTML = (data.team || []).map(t => `
                    <div class="team-card" style="background:rgba(255,255,255,0.03); border:1px solid rgba(135,50,118,0.3); border-radius:20px; padding:20px; text-align:center;">
                        <div style="font-size:1.8rem;">\ud83d\udc64</div>
                        <div style="color:var(--dash-accent); font-size:0.65rem; font-weight:900; text-transform:uppercase;">${t.role}</div>
                        <div style="font-weight:900; color:#fff;">${t.name}</div>
                        <div style="font-size:0.8rem; opacity:0.6; margin-top:5px;">\ud83d\udcde ${t.phone || ''}</div>
                    </div>
                `).join('');
            }

            // Checklist
            const checklist = data.checklist || [];
            const badge = document.getElementById('badgePrequal');
            if (badge) badge.innerText = checklist.filter(c => c.done).length + "/" + checklist.length;
            
            const wrapCheck = document.getElementById('wrapChecklist');
            if (wrapCheck) {
                wrapCheck.innerHTML = checklist.map(c => `
                    <div style="background:rgba(255,255,255,0.02); padding:15px; border-radius:15px; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:12px;">
                        <div style="color:${c.done ? '#2ecc71' : 'rgba(255,255,255,0.2)'}; font-weight:900;">${c.done ? '\u2713' : '!'}</div>
                        <div style="font-size:0.9rem; opacity:${c.done ? 1 : 0.6};">${c.name}</div>
                    </div>
                `).join('');
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('DOMContentLoaded', () => {
                // DÃ©tection du mode Standalone (PWA dÃ©jÃ  installÃ©e)
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                if (isStandalone) {
                    const pwaBtn = document.getElementById('btnPwaLogin');
                    if (pwaBtn) pwaBtn.style.display = 'none';
                }
                
                navigator.serviceWorker.register('/sw.js');
            });
        }

        async function installPortalApp() {
            const code = document.getElementById('inpPortalCode').value.toUpperCase() || 'EP-1001';
            window.location.href = `https://dossier.evanpatruno.ca/mon-dossier.html?code=${code}`;
        }
    </script>
</body>
</html>
