name: Monthly Market Report PDF

on:
  schedule:
    # Runs at 13:00 UTC (8:00 AM New York time) on the 1st of every month
    - cron: '0 13 1 * *'
  workflow_dispatch: # Allows manual run button

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'
          
      - name: Install Python Dependencies
        run: |
          pip install jinja2 requests
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Node Dependencies
        run: npm install
          
      - name: Generate Report HTML
        env:
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
        run: python report_generator.py

      - name: Convert HTML to PDF
        run: node puppeteer_convert.js

      - name: Commit and Push Report
        run: |
          git config --local user.email "evan.patruno@gmail.com"
          git config --local user.name "evanpatruno-spec"
          git add rapports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add monthly report [skip ci]" && git push)
