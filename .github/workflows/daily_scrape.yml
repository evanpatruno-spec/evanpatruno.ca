name: Daily Property Scrape

on:
  schedule:
    # Runs at 13:00 UTC (8:00 or 9:00 AM New York time)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual run button

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run All Scrapers & Generators
        env:
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
        run: |
          python scraper.py
          python news_scraper.py
          python boc_monitor.py
          python newsletter_generator.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "evan.patruno@gmail.com"
          git config --local user.name "evanpatruno-spec"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update [skip ci]" && git push)

