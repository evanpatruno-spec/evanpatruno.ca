name: Daily Property Scrape

on:
  schedule:
    # Runs at 13:00 UTC (8:00 or 9:00 AM New York time)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual run button

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install requests
          
      - name: Run Scraper
        run: python scraper.py

      - name: Run News Scraper
        run: python news_scraper.py

      - name: Run BOC Monitor
        run: python boc_monitor.py

      - name: Run Newsletter Generator
        run: python newsletter_generator.py
