<script>
    // SCRIPT DE NETTOYAGE ZOHO (Force la suppression des liens non désirés)
    document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
            // On exclue explicitement nos nouveaux badges de la suppression !
            var links = document.querySelectorAll('a[href*="commercial" i]:not(.ep-footer-accred-badge), a[href*="himalaya" i]:not(.ep-footer-accred-badge)');
            links.forEach(function (link) {
                if (link.parentNode && link.parentNode.tagName === 'LI') {
                    link.parentNode.remove(); // Enlève le LI au complet
                } else {
                    link.remove();
                }
            });
            var elementToRemove = document.querySelector('[data-element-id="elm_JiWAcyGyfnaNFhmORs6NFQ"]');
            if (elementToRemove) {
                elementToRemove.remove();
            }
        }, 1000); // Délai de 1s au cas où Zoho charge le footer dynamiquement
    });
</script>

<script>
    // READING PROGRESS BAR INITIALIZATION
    (function () {
        // Create bar element
        const bar = document.createElement('div');
        bar.id = 'ep-reading-progress';
        document.body.prepend(bar);

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            bar.style.width = scrolled + "%";
        });
    })();
</script>
