    <!-- BOC FLASH ALERT PREMIUM v2.0 - By Evan Patruno -->

    <style>
        :root {
            --boc-primary: #ff007f;
            --boc-bg: #1a0b16;
            --boc-accent: #873276;
        }

        #boc-alert-wrap {
            display: none;
            width: 100%;
            font-family: 'Inter', sans-serif;
            position: relative;
            z-index: 10;
            background: linear-gradient(90deg, var(--boc-bg) 0%, #2d0f28 100%);
            border-bottom: 2px solid var(--boc-accent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .boc-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            gap: 15px;
        }

        .boc-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .boc-badge {
            background: var(--boc-primary);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: boc-pulse 2s infinite;
            white-space: nowrap;
        }

        .boc-text {
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .boc-status-label { font-weight: 700; color: #ffb8e6; }
        .boc-rate-val { font-weight: 900; font-size: 1.1rem; color: #fff; }

        .boc-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .boc-next-ann {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 20px;
            white-space: nowrap;
        }

        .boc-next-val { color: #fff; font-weight: 600; }

        .boc-cta {
            background: #fff;
            color: var(--boc-bg);
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(255,255,255,0.1);
            white-space: nowrap;
            cursor: pointer;
            border: none;
        }

        .boc-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255,255,255,0.2);
            background: #f8f8f8;
        }

        @keyframes boc-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 127, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0); }
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .boc-container {
                flex-direction: column;
                gap: 12px;
                padding: 15px 10px;
                text-align: center;
            }
            .boc-left {
                flex-direction: column;
                gap: 8px;
            }
            .boc-text { font-size: 0.88rem; line-height: 1.4; }
            .boc-right {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }
            .boc-next-ann {
                border-left: none;
                padding-left: 0;
                font-size: 0.8rem;
            }
            .boc-cta {
                width: 100%;
                padding: 14px;
                font-size: 0.8rem;
            }
        }

        /* MODAL SYSTEM */
        #boc-lead-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 30000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #boc-lead-modal.active { display: flex; opacity: 1; }

        .boc-modal-card {
            background: #230d20;
            width: 100%;
            max-width: 480px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7);
            position: relative;
            padding: 40px;
            transform: translateY(20px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #boc-lead-modal.active .boc-modal-card { transform: translateY(0); }

        .boc-modal-close {
            position: absolute;
            top: 20px; right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .boc-modal-close:hover { color: white; transform: rotate(90deg); }

        .boc-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .boc-input:focus { border-color: var(--boc-primary); background: rgba(255,255,255,0.08); }

        .boc-submit {
            width: 100%;
            padding: 18px;
            background: var(--boc-primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .boc-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 0, 127, 0.3); }
    </style>

    <script>
        function openBocModal() { document.getElementById('boc-lead-modal').classList.add('active'); document.body.style.overflow='hidden'; }
        function closeBocModal() { document.getElementById('boc-lead-modal').classList.remove('active'); document.body.style.overflow=''; }

        function handleBocSubmit(e) {
            const btn = document.getElementById('bocBtnSubmit');
            btn.innerText = "Envoi en cours...";
            btn.disabled = true;
            setTimeout(() => {
                btn.innerText = "C'est noté ! Je vous rappelle. ✅";
                btn.style.background = "#25D366";
                setTimeout(closeBocModal, 2500);
            }, 1500);
        }

        (async function() {
            const BOC_BIN_ID = "69db9753856a682189265c0b"; 
            const MASTER_KEY = "$2a$10$qH2mqKg0/uXrs6l8qpQZRO/9kH1FUMjgmAiElTwDvlE..n3DhG08C";
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BOC_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                const record = data.record;
                
                const now = new Date();
                const nextAnn = new Date(record.next_date_iso + "T09:00:00"); 
                const lastAnn = new Date(record.last_date_iso + "T09:00:00");
                
                const diffNext = (nextAnn - now) / (1000 * 60 * 60 * 24);
                const diffLast = (now - lastAnn) / (1000 * 60 * 60 * 24);
                
                if (diffNext <= 7 || diffLast <= 7) {
                    document.getElementById('boc-rate').textContent = record.rate + '%';
                    document.getElementById('boc-status').textContent = record.status.toLowerCase();
                    document.getElementById('boc-next').textContent = record.next_announcement;
                    document.getElementById('boc-alert-wrap').style.display = 'block';
                }
            } catch (e) { console.warn("BOC Error:", e); }
        })();
    </script>
