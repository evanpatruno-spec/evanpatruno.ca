<style>
    .partners-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 30px;
        padding: 40px 20px;
        background: #f9f9f9;
    }

    .partner-logo {
        flex: 0 1 150px;
        /* Largeur de base */
        text-align: center;
        filter: grayscale(100%);
        opacity: 0.6;
        transition: all 0.4s ease;
        cursor: pointer;
    }

    .partner-logo img {
        max-width: 100%;
        height: auto;
        max-height: 80px;
        /* Hauteur max uniforme */
        object-fit: contain;
    }

    /* Effet au survol */
    .partner-logo:hover {
        filter: grayscale(0%);
        opacity: 1;
        transform: scale(1.05);
    }
</style>

<div class="partners-grid">
