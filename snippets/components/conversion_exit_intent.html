<script>
    // Configuration
    const PREF_KEY = 'evan_exit_popup_seen';
    const DAYS_TO_WAIT = 7; // Ne pas réafficher avant X jours

    function initExitIntent() {
        // Check if seen recently
        const lastSeen = localStorage.getItem(PREF_KEY);
        if (lastSeen) {
            const daysDiff = (new Date().getTime() - parseInt(lastSeen)) / (1000 * 3600 * 24);
            if (daysDiff < DAYS_TO_WAIT) return;
        }

        // Desktop: Mouseout top
        document.addEventListener('mouseleave', (e) => {
            if (e.clientY < 0) {
                showExitPopup();
            }
        });

        // Mobile: Scroll up triggers (approximate logic since no mouseout)
        // Simple fallback: Show after 30 seconds if not seen
        setTimeout(() => {
            // Optional: Uncomment for mobile aggressive strategy
            // if(window.innerWidth < 768) showExitPopup(); 
        }, 30000);
    }

    function showExitPopup() {
        // Double check not already open
        if (document.getElementById('exitPopup').classList.contains('visible')) return;

        document.getElementById('exitPopup').classList.add('visible');
        localStorage.setItem(PREF_KEY, new Date().getTime().toString());
    }

    function closeExitPopup() {
        document.getElementById('exitPopup').classList.remove('visible');
    }

    // State
    let currentGuide = 'Acheteur';

    function selectGuide(type) {
        currentGuide = type;

        // Visual Update
        const btns = document.querySelectorAll('.exit-choice-btn');
        btns.forEach(b => b.classList.remove('selected'));

        if (type === 'Acheteur') {
            btns[0].classList.add('selected');
            document.getElementById('exitDynamicTitle').innerText = "Le Guide de l'Acheteur";
            document.getElementById('exitDynamicDesc').innerText = "Ma checklist de 10 étapes pour acheter sans surpayer et éviter les regrets.";
            document.getElementById('guideSelectionInput').value = "EXIT_INTENT_ACHETEUR";
            document.getElementById('zohoBtn').innerText = "Recevoir mon Guide Acheteur ➔";
        } else {
            btns[1].classList.add('selected');
            document.getElementById('exitDynamicTitle').innerText = "Le Guide du Vendeur";
            document.getElementById('exitDynamicDesc').innerText = "La méthode exacte pour vendre au prix record en moins de 30 jours.";
            document.getElementById('guideSelectionInput').value = "EXIT_INTENT_VENDEUR";
            document.getElementById('zohoBtn').innerText = "Recevoir mon Guide Vendeur ➔";
        }
    }

    function handleZohoSubmit() {
        // UI updates immediately for better UX
        const btn = document.getElementById('zohoBtn');
        const fields = document.getElementById('exitFormFields');
        const success = document.getElementById('exitSuccess');
        const tag = document.querySelector('.exit-tag');
        const title = document.getElementById('exitDynamicTitle');
        const desc = document.getElementById('exitDynamicDesc');
        const choices = document.querySelector('.exit-choice-container');

        btn.innerText = "Envoi en cours...";
        btn.disabled = true;

        // Assume succes after 1.5s (iframe loads silently)
        setTimeout(() => {
            if(tag) tag.style.display = 'none';
            if(title) title.style.display = 'none';
            if(desc) desc.style.display = 'none';
            if(choices) choices.style.display = 'none';
            if(fields) fields.style.display = 'none';
            
            if(success) success.style.display = 'block';

            // Close after delay
            setTimeout(closeExitPopup, 4000);
        }, 1500);
    }

    // Run
    // Delay init slightly to avoid triggering instantly on page load
    setTimeout(initExitIntent, 2000);
    // Init default state text
    selectGuide('Acheteur');
</script>
