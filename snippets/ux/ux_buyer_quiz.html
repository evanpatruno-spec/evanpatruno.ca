<style>
    .quiz-widget {
        background: #2b0b24; /* Brand Dark Card */
        padding: 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
        max-width: 500px;
        margin: 40px auto;
        font-family: 'Inter', sans-serif;
        color: white;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden;
    }

    .quiz-widget::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(135, 50, 118, 0.1) 0%, transparent 70%);
        pointer-events: none;
    }

    .quiz-step {
        display: none;
        position: relative;
        z-index: 2;
    }

    .quiz-step.active {
        display: block;
        animation: slideUpFade 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .quiz-title {
        margin-bottom: 30px;
        color: white;
        font-size: 1.5rem;
        font-weight: 800;
        line-height: 1.2;
    }

    .quiz-btn {
        display: block;
        width: 100%;
        margin: 12px 0;
        padding: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 600;
        color: white;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: left;
        position: relative;
    }

    .quiz-btn:hover {
        background: #873276;
        border-color: #873276;
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(135, 50, 118, 0.3);
    }

    .quiz-btn::after {
        content: '→';
        position: absolute;
        right: 20px;
        opacity: 0;
        transition: all 0.3s;
    }

    .quiz-btn:hover::after {
        opacity: 1;
        right: 15px;
    }

    .quiz-progress {
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        margin-bottom: 30px;
        position: relative;
    }

    .quiz-progress-bar {
        height: 100%;
        background: #873276;
        width: 33%;
        border-radius: 2px;
        transition: width 0.4s ease;
    }

    .quiz-final-btn {
        background: #873276;
        border-color: #873276;
        text-align: center;
        margin-top: 20px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .quiz-final-btn:hover {
        background: #6a275d;
        transform: translateY(-3px);
    }

    @keyframes slideUpFade {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 480px) {
        .quiz-widget { padding: 30px 20px; margin: 20px 10px; }
        .quiz-title { font-size: 1.3rem; }
    }
</style>

<div class="quiz-widget">
    <div class="quiz-progress">
        <div class="quiz-progress-bar" id="quizBar"></div>
    </div>

    <!-- Etape 1 -->
    <div class="quiz-step active" id="qs1">
        <h3 class="quiz-title">Quel est votre objectif prioritaire ?</h3>
        <button class="quiz-btn" onclick="nextStep(2, 'Achat', '66%')">Acheter ma première maison 🏠</button>
        <button class="quiz-btn" onclick="nextStep(2, 'Vente', '66%')">Vendre ma propriété actuelle 🏷️</button>
        <button class="quiz-btn" onclick="nextStep(2, 'Invest', '66%')">Investir en immobilier 📈</button>
    </div>

    <!-- Etape 2 -->
    <div class="quiz-step" id="qs2">
        <h3 class="quiz-title">Quel est votre délai idéal ?</h3>
        <button class="quiz-btn" onclick="nextStep(3, 'Urgent', '100%')">Immédiatement (< 3 mois) 🚀</button>
        <button class="quiz-btn" onclick="nextStep(3, 'Moyen', '100%')">Dans 3 à 6 mois 📅</button>
        <button class="quiz-btn" onclick="nextStep(3, 'Long', '100%')">Je regarde seulement 👀</button>
    </div>

    <!-- Etape Final -->
    <div class="quiz-step" id="qs3">
        <h3 class="quiz-title">Analyse terminée ! ✅</h3>
        <p style="margin-bottom: 25px; opacity: 0.9;">J'ai élaboré une stratégie spécifique pour votre profil. Passons à l'action.</p>
        <a href="/contact" class="quiz-btn quiz-final-btn" style="text-decoration:none; display: block;">Prendre RDV stratégique</a>
    </div>
</div>

<script>
    function nextStep(stepNum, val, progress) {
        // Cacher tout
        document.querySelectorAll('.quiz-step').forEach(el => el.classList.remove('active'));
        // Afficher suivant
        document.getElementById('qs' + stepNum).classList.add('active');
        // Update Progress
        document.getElementById('quizBar').style.width = progress;
        // Logic can be added here to redirect or save 'val'
    }
</script>
