<style>
    .mortgage-calc-widget {
        background: #ffffff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        margin: 0 auto;
        font-family: sans-serif;
        color: #333;
    }

    .mortgage-calc-widget h3 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 1.5rem;
    }

    .mc-form-group {
        margin-bottom: 15px;
    }

    .mc-form-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #555;
    }

    .mc-form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 1rem;
        box-sizing: border-box;
        /* Important pour ne pas déborder */
        transition: border-color 0.3s;
    }

    .mc-form-group input:focus {
        border-color: #e53935;
        /* Rouge accent */
        outline: none;
    }

    .mc-btn-calc {
        width: 100%;
        background-color: #2c3e50;
        /* Bleu foncé */
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-top: 10px;
    }

    .mc-btn-calc:hover {
        background-color: #e53935;
        /* Changement au survol */
    }

    .mc-result {
        margin-top: 20px;
        text-align: center;
        padding: 15px;
        background-color: #f8f9fa;
        border-radius: 6px;
        display: none;
        /* Caché par défaut */
    }

    .mc-result-label {
        font-size: 0.9rem;
        color: #777;
    }

    .mc-result-value {
        font-size: 1.8rem;
        font-weight: 800;
        color: #2c3e50;
        margin-top: 5px;
    }
</style>

<div class="mortgage-calc-widget">
    <h3>Calculatrice Hypothécaire Rapid</h3>

    <div class="mc-form-group">
        <label for="mc-amount">Montant du prêt ($)</label>
        <input type="number" id="mc-amount" placeholder="ex: 400000" value="400000">
    </div>

    <div class="mc-form-group">
        <label for="mc-rate">Taux d'intérêt (%)</label>
        <input type="number" id="mc-rate" placeholder="ex: 4.5" step="0.01" value="4.5">
    </div>

    <div class="mc-form-group">
        <label for="mc-years">Amortissement (années)</label>
        <input type="number" id="mc-years" placeholder="ex: 25" value="25">
    </div>

    <button class="mc-btn-calc" onclick="calculateMortgage()">Calculer</button>

    <div class="mc-result" id="mc-result-box">
        <div class="mc-result-label">Paiement mensuel estimé</div>
        <div class="mc-result-value" id="mc-monthly-payment">-</div>
    </div>
</div>

<script>
    function calculateMortgage() {
        // 1. Récupération des valeurs
        const p = parseFloat(document.getElementById('mc-amount').value);
        const r = parseFloat(document.getElementById('mc-rate').value) / 100 / 12; // Taux mensuel
        const n = parseFloat(document.getElementById('mc-years').value) * 12; // Nombre de mois

        // 2. Validation
        if (!p || !r || !n) {
            alert("Veuillez remplir tous les champs correctement.");
            return;
        }

        // 3. Calcul (Formule standard)
        // M = P [ i(1 + i)^n ] / [ (1 + i)^n – 1 ]
        const m = p * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

        // 4. Affichage
        document.getElementById('mc-monthly-payment').textContent = m.toFixed(2) + " $";
        document.getElementById('mc-result-box').style.display = 'block';
    }
</script>
