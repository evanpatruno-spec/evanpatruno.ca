<style>
    :root {
        --primary-color: #1e0a19; /* Brand Dark */
        --accent-color: #873276;  /* Brand Purple */
        --bg-color: #f8f9fa;
        --text-color: #333;
    }

    .affordability-widget {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        padding: 30px;
        max-width: 600px;
        margin: 20px auto;
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--text-color);
        border: 1px solid rgba(0,0,0,0.05);
    }

    .aw-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .aw-header h2 {
        margin: 0;
        color: var(--primary-color);
        font-size: 1.8rem;
        font-weight: 800;
    }

    .aw-header p {
        color: #666;
        font-size: 0.95rem;
        margin-top: 5px;
    }

    /* Ranges & Inputs */
    .aw-input-group {
        margin-bottom: 25px;
    }

    .aw-label-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .aw-value-display {
        color: var(--accent-color);
        font-weight: 800;
    }

    input[type="range"] {
        width: 100%;
        height: 8px;
        background: #eee;
        border-radius: 10px;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
        cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 24px;
        height: 24px;
        background: var(--accent-color);
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: transform 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
    }

    /* Result Section */
    .aw-result-box {
        background: var(--primary-color);
        color: white;
        border-radius: 15px;
        padding: 30px;
        text-align: center;
        margin-top: 30px;
        box-shadow: 0 15px 30px rgba(30, 10, 25, 0.2);
    }

    .aw-purchasing-power {
        font-size: 2.8rem;
        font-weight: 800;
        color: white;
        margin: 10px 0;
        letter-spacing: -1px;
    }

    .aw-sub-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .aw-stat-item {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.7);
    }

    .aw-stat-val {
        display: block;
        font-size: 1.2rem;
        font-weight: 700;
        color: white;
        margin-top: 4px;
    }

    .aw-btn {
        display: block;
        background: var(--accent-color);
        color: white;
        text-decoration: none;
        padding: 18px 24px;
        border-radius: 50px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s;
        margin-top: 30px;
    }

    .aw-btn:hover {
        background: #6a275d;
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(135, 50, 118, 0.4);
    }

    @media (max-width: 600px) {
        .affordability-widget {
            padding: 20px;
            margin: 10px;
            border-radius: 15px;
        }
        .aw-header h2 { font-size: 1.5rem; }
        .aw-purchasing-power { font-size: 2.2rem; }
        .aw-sub-stats { grid-template-columns: 1fr; gap: 15px; }
        .aw-btn { padding: 15px; font-size: 0.9rem; }
    }

    /* Tooltip CSS */
    .evt-tooltip {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: help;
        border-bottom: 1px dotted #ccc;
    }

    .evt-tooltip::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 120%;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--primary-color);
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.8rem;
        white-space: normal;
        min-width: 200px;
        text-align: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s ease;
        box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        z-index: 10;
        font-weight: 500;
        pointer-events: none;
    }

    .evt-tooltip::before {
        content: '';
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-top-color: var(--primary-color);
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s ease;
        pointer-events: none;
    }

    .evt-tooltip:hover::after, .evt-tooltip:hover::before {
        opacity: 1;
        visibility: visible;
        bottom: 130%;
    }

    .evt-tooltip-icon {
        background: var(--accent-color);
        color: white;
        border-radius: 50%;
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: bold;
    }
</style>

<div class="affordability-widget">
    <div class="aw-header">
        <h2>Combien puis-je emprunter ?</h2>
        <p>Estimez votre capacité d'achat en quelques secondes.</p>
    </div>

    <!-- Revenus -->
    <div class="aw-input-group">
        <div class="aw-label-row">
            <label class="evt-tooltip" data-tooltip="Inclut le salaire de base, commissions stables, et primes garanties des co-emprunteurs.">Revenu Annuel Brut (Ménage) <span class="evt-tooltip-icon">?</span></label>
            <span class="aw-value-display" id="disp-income">$100,000</span>
        </div>
        <input type="range" id="input-income" min="30000" max="300000" step="1000" value="100000"
            oninput="updateCalc()">
    </div>

    <!-- Dettes -->
    <div class="aw-input-group">
        <div class="aw-label-row">
            <label class="evt-tooltip" data-tooltip="Paiements minimums mensuels: cartes de crédit, prêts auto, marges (Normalement 3% du solde).">Dettes Mensuelles <span class="evt-tooltip-icon">?</span></label>
            <span class="aw-value-display" id="disp-debts">$500</span>
        </div>
        <input type="range" id="input-debts" min="0" max="5000" step="50" value="500" oninput="updateCalc()">
    </div>
    
    <!-- Condos -->
    <div class="aw-input-group">
        <div class="aw-label-row">
            <label class="evt-tooltip" data-tooltip="Au Canada, on calcule 50% de vos frais de condo mensuels dans vos ratios d'endettement. Laissez à 0 si c'est une maison.">Frais de Condo Mensuels (Est.) <span class="evt-tooltip-icon">?</span></label>
            <span class="aw-value-display" id="disp-condo">$0</span>
        </div>
        <input type="range" id="input-condo" min="0" max="1500" step="10" value="0" oninput="updateCalc()">
    </div>

    <!-- Mise de Fonds -->
    <div class="aw-input-group">
        <div class="aw-label-row">
            <label class="evt-tooltip" data-tooltip="Montant d'argent comptant que vous avez pour l'achat. Note: Le système déduira automatiquement les frais de clôture (Cash Dam) pour connaître le fond disponible.">Mise de Fonds Disponible <span class="evt-tooltip-icon">?</span></label>
            <span class="aw-value-display" id="disp-down">$40,000</span>
        </div>
        <input type="range" id="input-down" min="5000" max="200000" step="1000" value="40000" oninput="updateCalc()">
    </div>

    <!-- Taux -->
    <div class="aw-input-group" style="display:flex; gap:10px; align-items:center;">
        <label class="evt-tooltip" data-tooltip="Taux contractuel visé avec la banque. Le calculateur appliquera automatiquement le Stress Test canadien (Taux + 2% ou min 5.25%) pour évaluer votre dossier." style="font-size:0.9rem; font-weight:600;">Taux Hypothécaire (%) <span class="evt-tooltip-icon">?</span> :</label>
        <input type="number" id="input-rate" value="4.89" step="0.05"
            style="width:80px; padding:5px; border:1px solid #ddd; border-radius:5px;" onchange="updateCalc()">
    </div>

    <div class="aw-result-box">
        <div style="font-weight:600; text-transform:uppercase; font-size:0.8rem; letter-spacing:1px; color:#888;">
            Capacité d'Achat Maximale</div>
        <div class="aw-purchasing-power" id="res-power">$450,250</div>

        <div class="aw-sub-stats">
            <div class="aw-stat-item">
                Hypothèque Max
                <span class="aw-stat-val" id="res-mortgage">$410,250</span>
            </div>
            <div class="aw-stat-item">
                Paiement Mensuel (Est.)
                <span class="aw-stat-val" id="res-payment">$2,450</span>
            </div>
        </div>
    </div>

    <div class="aw-cta" style="text-align:center;">
        <a href="#contact-modal" class="aw-btn">Obtenir une Pré-Qualification Officielle</a>
    </div>
</div>

<script>
    // Constantes (Règles hypothécaires canadiennes approximatives)
    // GDS (Amortissement brut de la dette) ~ 39%
    // TDS (Amortissement total de la dette) ~ 44%
    // Chauffage estimé ~ 150$/mois
    // Taxes municipales estimées ~ 1% de la valeur / an

    const GDS_LIMIT = 0.39;
    const TDS_LIMIT = 0.44;
    const HEAT_EST = 150;

    function updateCalc() {
        // 1. Get Values
        const income = parseFloat(document.getElementById('input-income').value);
        const debts = parseFloat(document.getElementById('input-debts').value);
        const condoFees = parseFloat(document.getElementById('input-condo').value);
        const downPayment = parseFloat(document.getElementById('input-down').value);
        const contractRatePercent = parseFloat(document.getElementById('input-rate').value);

        // Update Displays
        document.getElementById('disp-income').innerText = formatCurrency(income);
        document.getElementById('disp-debts').innerText = formatCurrency(debts);
        document.getElementById('disp-condo').innerText = formatCurrency(condoFees);
        document.getElementById('disp-down').innerText = formatCurrency(downPayment);

        // 2. Calculations
        // Monthly Income
        const monthlyIncome = income / 12;
        
        // Canada OSFI Stress Test Rule: Contract Rate + 2%, OR minimum 5.25%.
        const qualifyingRatePercent = Math.max(contractRatePercent + 2.0, 5.25);

        // Calculate max carrying costs allowed based on GDS
        // (Mortgage + Tax + Heat + 50% Condo) <= Income * 0.39
        const maxGDS_Cost = (monthlyIncome * GDS_LIMIT) - (condoFees * 0.5);

        // Calculate max carrying costs based on TDS
        // (Mortgage + Tax + Heat + 50% Condo + Debts) <= Income * 0.44
        const maxTDS_Cost = (monthlyIncome * TDS_LIMIT) - debts - (condoFees * 0.5);

        // The limiting factor is the LOWEST of the two
        const maxTotalHousingCost = Math.min(maxGDS_Cost, maxTDS_Cost);

        // Mortgage Constant (for Stress Test Qualifying Rate)
        const q_r = (qualifyingRatePercent / 100) / 12;
        const n = 25 * 12; // 25 years default amortization
        const qualifyingMortgageFactor = (q_r * Math.pow(1 + q_r, n)) / (Math.pow(1 + q_r, n) - 1);
        
        // Mortgage Constant (for Actual Default Payment based on Contract Rate)
        const c_r = (contractRatePercent / 100) / 12;
        const actualMortgageFactor = (c_r * Math.pow(1 + c_r, n)) / (Math.pow(1 + c_r, n) - 1);

        // Formula derivation:
        // MaxHousing = (Loan * Factor) + (Price * TaxRate) + Heat
        // MaxHousing - Heat = (Price - Down) * Factor + Price * TaxRate
        // MaxHousing - Heat + (Down * Factor) = Price * Factor + Price * TaxRate
        // MaxHousing - Heat + (Down * Factor) = Price * (Factor + TaxRate)
        // Price = (MaxHousing - Heat + (Down * Factor)) / (Factor + TaxRate)

        const taxRateMonthly = 0.01 / 12; // Approx 1% annual tax

        let maxAffordability = (maxTotalHousingCost - HEAT_EST + (downPayment * qualifyingMortgageFactor)) / (qualifyingMortgageFactor + taxRateMonthly);

        // Safety check
        if (maxAffordability < 0) maxAffordability = 0;

        // Loan Amount
        let maxLoan = maxAffordability - downPayment;
        if (maxLoan < 0) maxLoan = 0;

        // Payment (Actual payment based on loan amount & CONTRACT RATE, not stress test rate)
        const monthlyPayment = maxLoan * actualMortgageFactor;

        // 3. Update Result UI
        document.getElementById('res-power').innerText = formatCurrency(maxAffordability);
        document.getElementById('res-mortgage').innerText = formatCurrency(maxLoan);
        document.getElementById('res-payment').innerText = formatCurrency(monthlyPayment) + " / mois";
    }

    function formatCurrency(num) {
        return new Intl.NumberFormat('fr-CA', { style: 'currency', currency: 'CAD', maximumFractionDigits: 0 }).format(num);
    }

    // Init
    updateCalc();
</script>
