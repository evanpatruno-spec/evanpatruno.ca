<!-- 
Barre de Défilement Personnalisée (Scrollbar)
INSTRUCTIONS:
1. Ajouter dans le Footer.
-->

<style>
    /* Largeur de la barre */
    ::-webkit-scrollbar {
        width: 10px;
    }

    /* Le fond de la barre (track) */
    ::-webkit-scrollbar-track {
        background: #f1f1f1;
    }

    /* La poignée (handle) qui bouge */
    ::-webkit-scrollbar-thumb {
        background: #2c3e50;
        /* Couleur principale (Bleu foncé) */
        border-radius: 5px;
    }

    /* Au survol de la poignée */
    ::-webkit-scrollbar-thumb:hover {
        background: #e53935;
        /* Couleur accent (Rouge) */
    }
</style>
