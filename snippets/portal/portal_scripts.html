<script>
    /**
     * PORTAL SCRIPTS v15.0 - FULL VISUAL UPGRADE
     */
    const API_URL = 'https://evanpatruno-ca.vercel.app/api/portal';

    function initPortal() {
        const code = localStorage.getItem('portal_code');
        const phone = localStorage.getItem('portal_phone');
        if (code && phone) handlePortalLogin();
    }

    async function handlePortalLogin(e) {
        if (e && e.preventDefault) e.preventDefault();
        const inpCode = document.getElementById('inpPortalCode');
        const inpPhone = document.getElementById('inpPortalPhone');
        const btn = document.getElementById('btnPortalLogin');
        const code = (inpCode?.value || localStorage.getItem('portal_code'))?.trim().toUpperCase();
        const phone = (inpPhone?.value || localStorage.getItem('portal_phone'))?.trim();
        if (!code || !phone) return;
        if (btn) { btn.innerHTML = '<span class="spinner"></span>Vérification...'; btn.disabled = true; }
        try {
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ codePortal: code, phoneLast4: phone }) });
            const data = await res.json();
            if (!res.ok) throw new Error((data.error || "Accès refusé.") + (data.details ? ": " + data.details : ""));
            localStorage.setItem('portal_code', code);
            localStorage.setItem('portal_phone', phone);
            localStorage.setItem('portal_deal_id', data.id);
            renderPortal(data);
            document.getElementById('portalOverlay').classList.add('hidden');
            document.getElementById('portalDash').classList.add('visible');
        } catch (error) { 
            const msg = error.message || "Erreur inconnue";
            alert("⚠️ Erreur : " + msg); 
            if (btn) { btn.innerHTML = 'Ouvrir mon dossier'; btn.disabled = false; } 
        }
    }

    function formatVisitDate(dt) {
        if (!dt) return "À venir";
        try {
            const cleanDT = dt.replace(' ', 'T');
            const d = new Date(cleanDT);
            if (isNaN(d)) return dt;
            const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
            const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
            const h = d.getHours().toString().padStart(2,'0');
            const min = d.getMinutes().toString().padStart(2,'0');
            return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()} à ${h}h${min}`;
        } catch (e) { return dt; }
    }

    function getStatusClass(statut) {
        const s = (statut || '').toLowerCase();
        if (s.includes('confirm')) return 'status-confirme';
        if (s.includes('annul')) return 'status-annule';
        return 'status-attente';
    }

    function renderPortal(data) {
        if (!data) return;
        const setT = (id, v) => { const el = document.getElementById(id); if(el) el.innerText = v || "--"; };
        
        const hour = new Date().getHours();
        const greeting = hour < 12 ? 'Bonjour' : hour < 18 ? 'Bon après-midi' : 'Bonsoir';
        setT('txtWelcome', `${greeting} ${data.firstName || 'Evan'}.`);
        setT('txtPropName', `${data.property || ''} - ${data.city || ''}`);
        setT('txtCodeRef', `#${data.code || ''}`);

        // Heure de connexion
        const loginTimeEl = document.getElementById('txtLoginTime');
        if (loginTimeEl) {
            const now = new Date();
            loginTimeEl.innerText = `Connecté à ${now.getHours()}h${now.getMinutes().toString().padStart(2,'0')}`;
        }

        const s = (data.timeline || []).find(x => x.status === 'active') || (data.timeline || []).find(x => x.status === 'pending');
        setT('badgeStage', s ? s.label : "Dossier Actif");
        const nextCondition = (data.checklist || []).find(c => !c.done);
        setT('dashNextStep', nextCondition ? nextCondition.name : "Terminé !");
        const nextVisit = (data.visites || []).find(v => v.statut === 'Confirmée' || v.statut === 'Prévue' || v.statut === 'Confirmé');
        setT('dashNextVisit', nextVisit ? formatVisitDate(nextVisit.Date_heure_de_visite) : "Aucun planifié");

        const safe = (fn) => { try { fn(); } catch(e) { console.warn(e); } };
        safe(() => renderMilestones(data.milestones || {}));
        safe(() => renderTimeline(data.timeline || []));
        safe(() => renderChecklist(data.checklist || []));
        safe(() => renderVisites(data.visites || [], data.code));
        safe(() => renderTeam(data.team || []));
        safe(() => renderPartners(data.partners || []));
    }

    function renderMilestones(m) {
        const wrap = document.getElementById('wrapMilestones'); if (!wrap) return;
        const config = [
            {l:'Financement', d:m.financing, icon:'🏦'},
            {l:'Inspection', d:m.inspection, icon:'🔍'},
            {l:'Signature', d:m.signature, icon:'✒️'},
            {l:'Occupation', d:m.occupation, icon:'🏠'}
        ];
        wrap.innerHTML = config.map(ms => {
            const days = ms.d?.days;
            const done = days !== null && days < 0;
            const hasVal = days !== null && days !== undefined;
            const valHtml = done 
                ? `<div class="milestone-val">✓</div><div class="milestone-badge">TERMINÉ</div>`
                : hasVal 
                    ? `<div class="milestone-badge">JOURS RESTANTS</div><div class="milestone-val">${days}</div>`
                    : `<div style="font-size:1.8rem; margin: 10px 0;">${ms.icon}</div><div class="milestone-val empty">À venir</div>`;
            return `<div class="milestone-card">${valHtml}<div class="milestone-label">${ms.l}</div></div>`;
        }).join('');
    }

    function renderTimeline(timeline) {
        const wrap = document.getElementById('wrapTimeline'); if (!wrap) return;
        wrap.querySelectorAll('.step-node:not(.timeline-progress-bar)').forEach(n => n.remove());
        let completed = 0;
        timeline.forEach(s => {
            const node = document.createElement('div'); node.className = `step-node ${s.status}`;
            node.innerHTML = `<div class="node-dot">${s.icon || '○'}</div><div style="font-size:0.8rem; font-weight:700; margin-top:12px; text-align:center;">${s.label}</div>`;
            wrap.appendChild(node);
            if (s.status === 'completed') completed++; if (s.status === 'active') completed += 0.5;
        });
        setTimeout(() => {
            const bar = document.getElementById('barProgress');
            const pct = timeline.length > 1 ? Math.max(0, ((completed - 1) / (timeline.length - 1)) * 100) : 0;
            if (bar) {
                if (window.innerWidth <= 768) { bar.style.height = `${pct * 0.8}%`; bar.style.width = '2px'; }
                else { bar.style.width = `${pct * 0.8}%`; bar.style.height = '3px'; }
            }
        }, 400);
    }

    function renderChecklist(checklist) {
        const wrap = document.getElementById('wrapChecklist'); if (!wrap) return;
        wrap.innerHTML = checklist.map(c => `
            <div style="background:rgba(255,255,255,0.02); padding:15px 20px; border-radius:15px; border:1px solid ${c.done?'rgba(46,204,113,0.25)':'rgba(255,255,255,0.08)'}; display:flex; align-items:center; gap:14px; transition:0.3s;">
                <div style="width:24px; height:24px; border-radius:50%; flex-shrink:0; background:${c.done?'linear-gradient(135deg,#1a8a4a,#2ecc71)':'rgba(255,255,255,0.07)'}; color:#fff; font-size:0.7rem; display:flex; align-items:center; justify-content:center; box-shadow:${c.done?'0 0 12px rgba(46,204,113,0.4)':'none'};">${c.done?'✓':'·'}</div>
                <span style="font-size:0.9rem; font-weight:600; color:${c.done?'#fff':'rgba(255,255,255,0.35)'}; ${c.done?'':'text-decoration:none;'}">${c.name || '--'}</span>
                ${c.done ? '<div style="margin-left:auto; font-size:0.6rem; color:#2ecc71; font-weight:800; text-transform:uppercase;">Levé</div>' : ''}
            </div>`).join('');
    }

    function renderVisites(visites, portalCode) {
        const wrap = document.getElementById('wrapVisites'); if (!wrap) return;
        if (!visites || visites.length === 0) { 
            wrap.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🏠</div>
                    <p>Aucune visite planifiée pour le moment.</p>
                    <p style="margin-top:8px; font-size:0.8rem;">Utilisez le formulaire ci-dessus pour en demander une.</p>
                </div>`; 
            return; 
        }
        wrap.innerHTML = visites.map((v, idx) => {
            const localFB = JSON.parse(localStorage.getItem(`visit_fb_${portalCode}_${v.id}`) || "{}");
            const verdict = v.verdict || localFB.verdict || "";
            const rating = v.evaluation ? parseInt(v.evaluation) : (localFB.rating || 0);
            const statusClass = getStatusClass(v.statut);
            
            const stars = [1,2,3,4,5].map(s => 
                `<button class="star-btn ${s <= rating ? 'active' : 'inactive'}" onclick="saveRating('${v.id}', ${s}, this)">⭐</button>`
            ).join('');

            const verdicts = [
                {val:'Coup de coeur', emoji:'❤️', label:'Coup de cœur'},
                {val:'A réfléchir', emoji:'🧐', label:'À réfléchir'},
                {val:'Pas pour moi', emoji:'👎', label:'Pas pour moi'}
            ];
            const verdictBtns = verdicts.map(vd => 
                `<button class="verdict-btn ${verdict===vd.val?'selected':''}" onclick="saveVerdict('${v.id}', '${vd.val}', this)">
                    <span class="emoji">${vd.emoji}</span>
                    <span class="label">${vd.label}</span>
                </button>`
            ).join('');

            return `
            <div class="visit-card" style="animation-delay:${idx*0.08}s;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                    <div>
                        <div style="font-weight:900; color:#fff; font-size:1rem; line-height:1.3;">${formatVisitDate(v.Date_heure_de_visite)}</div>
                        <div style="font-size:0.85rem; color:var(--dash-accent); margin-top:4px;">📍 ${v.location || 'Lieu'}</div>
                    </div>
                    <div class="status-badge ${statusClass}">${v.statut || 'En attente'}</div>
                </div>
                <hr style="border:none; border-top:1px solid rgba(255,255,255,0.05); margin:0 0 15px 0;">
                <div class="feedback-zone">
                    <div class="feedback-label">⭐ Évaluation visite</div>
                    <div style="display:flex; gap:6px; justify-content:center; margin-bottom:18px;">${stars}</div>
                    <div class="feedback-label">🏷️ Verdict visite</div>
                    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:18px; flex-wrap:wrap;">${verdictBtns}</div>
                    <div class="feedback-label">💬 Commentaire</div>
                    <textarea id="comm-${v.id}" class="feedback-textarea" oninput="updateLocalFB('${v.id}', 'comm', this.value)" placeholder="Décrivez vos impressions sur cette propriété...">${v.commentaire || localFB.comm || ""}</textarea>
                    <button onclick="syncVisitFeedback('${v.id}')" id="btn-sync-${v.id}" class="submit-avis-btn">Enregistrer mon avis ✨</button>
                </div>
            </div>`;
        }).join('');
    }

    function updateLocalFB(id, key, val) {
        const code = localStorage.getItem('portal_code');
        const storageKey = `visit_fb_${code}_${id}`;
        const fb = JSON.parse(localStorage.getItem(storageKey) || "{}");
        fb[key] = val; localStorage.setItem(storageKey, JSON.stringify(fb));
    }

    function saveRating(id, r, el) {
        updateLocalFB(id, 'rating', r);
        const stars = el.parentElement.querySelectorAll('.star-btn');
        stars.forEach((s, idx) => {
            s.classList.toggle('active', idx < r);
            s.classList.toggle('inactive', idx >= r);
            if (idx < r) { s.style.transform = 'scale(1.2)'; setTimeout(() => s.style.transform = '', 300); }
        });
    }

    function saveVerdict(id, v, btn) {
        updateLocalFB(id, 'verdict', v);
        btn.closest('.feedback-zone').querySelectorAll('.verdict-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    async function syncVisitFeedback(id) {
        const code = localStorage.getItem('portal_code'), dealId = localStorage.getItem('portal_deal_id'), btn = document.getElementById(`btn-sync-${id}`);
        const comm = document.getElementById(`comm-${id}`).value;
        const localFB = JSON.parse(localStorage.getItem(`visit_fb_${code}_${id}`) || "{}");
        if (!dealId || !btn) return;
        btn.innerHTML = '<span class="spinner"></span>Envoi...'; btn.disabled = true;
        try {
            const payload = { codePortal: code, dealId: dealId, visitId: id, evaluation: String(localFB.rating || 5), verdict: localFB.verdict || "A réfléchir", commentaire: comm };
            const res = await fetch(`${API_URL}?action=pushAvisV13`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.s) { 
                btn.innerHTML = '✅ Avis enregistré !'; 
                btn.classList.add('success'); 
                setTimeout(() => { btn.innerHTML = 'Modifier mon avis ✏️'; btn.classList.remove('success'); btn.disabled = false; }, 3000);
            } else { throw new Error((result.error || "Erreur API") + (result.details ? ": " + JSON.stringify(result.details).substring(0, 100) : "")); }
        } catch (e) { btn.innerHTML = '⚠️ Réessayer'; btn.disabled = false; alert("⚠️ Erreur avis : " + e.message); console.error("Sync Error:", e); }
    }

    async function requestVisit() {
        const loc = document.getElementById('inpVisitLoc').value.trim(), dt = document.getElementById('inpVisitDateTime').value, d = localStorage.getItem('portal_deal_id'), c = localStorage.getItem('portal_code');
        if (!loc || !dt) { alert("Veuillez remplir l'adresse et la date."); return; }
        const btn = document.querySelector('[onclick="requestVisit()"]');
        if (btn) { btn.innerHTML = '<span class="spinner"></span>Envoi...'; btn.disabled = true; }
        try { 
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'requestVisit', codePortal: c, dealId: d, location: loc, dateTime: dt }) }); 
            const result = await res.json();
            if (result.s) { 
                alert("✅ Demande de visite envoyée ! Evan vous contactera pour confirmer."); 
                document.getElementById('inpVisitLoc').value=''; 
                document.getElementById('inpVisitDateTime').value=''; 
            } else { alert("⚠️ Erreur : " + (result.details || result.error || "Erreur inconnue")); }
        } catch (e) { alert("⚠️ Erreur de connexion : " + e.message); }
        if (btn) { btn.innerHTML = 'Envoyer la demande'; btn.disabled = false; }
    }

    function renderTeam(team) { 
        const w = document.getElementById('wrapTeam'); if (!w || !team) return; 
        w.innerHTML = team.map(t => `
            <div class="team-card">
                <div style="font-size:2rem; margin-bottom:8px;">${t.icon || '👤'}</div>
                <div style="font-size:0.6rem; color:var(--dash-accent); font-weight:900; text-transform:uppercase; margin-bottom:4px;">${t.role || 'Expert'}</div>
                <div style="font-weight:800; color:#fff; font-size:0.95rem;">${t.name || '--'}</div>
                <div class="team-actions">
                    ${t.contact && t.contact !== '#' ? `<a href="${t.contact}" class="team-action-btn">📞 Contacter</a>` : ''}
                    ${t.email && t.email !== 'À venir' ? `<a href="mailto:${t.email}" class="team-action-btn">✉️ Écrire</a>` : ''}
                </div>
            </div>`).join(''); 
    }

    function renderPartners(partners) { 
        const w = document.getElementById('wrapPartners'); if (!w || !partners) return; 
        w.innerHTML = partners.map(p => `
            <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:25px; border:1px solid var(--dash-border); position:relative; overflow:hidden; transition:0.3s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='none'">
                <div style="position:absolute; top:12px; right:-25px; background:var(--dash-primary); color:#fff; padding:3px 30px; transform:rotate(45deg); font-size:0.55rem; font-weight:900;">PROMO</div>
                <div style="font-size:1.5rem; margin-bottom:10px;">${p.icon || '🤝'}</div>
                <div style="font-family:'Outfit'; font-weight:800; color:#fff;">${p.name || 'Partenaire'}</div>
                <div style="font-size:0.75rem; color:var(--dash-accent); margin-top:5px; font-weight:700;">${p.benefit || 'Avantage exclusif'}</div>
                ${p.code ? `<div style="background:rgba(135,50,118,0.15); border:1px solid rgba(135,50,118,0.3); border-radius:8px; padding:6px 12px; margin-top:10px; font-size:0.7rem; font-weight:800; color:#fff; letter-spacing:1px;">Code: ${p.code}</div>` : ''}
            </div>`).join(''); 
    }

    async function requestMLSDoc() { 
        const m = document.getElementById('inpMLS').value.trim(), d = localStorage.getItem('portal_deal_id'), c = localStorage.getItem('portal_code'); 
        if (!m) { alert("Veuillez entrer un numéro MLS."); return; }
        const btn = document.querySelector('[onclick="requestMLSDoc()"]');
        if (btn) { btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true; }
        try { 
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'requestMLS', mlsNumber: m, dealId: d, codePortal: c }) }); 
            const result = await res.json();
            alert(result.s ? "✅ Demande envoyée ! Evan vous préparera les documents." : "⚠️ Erreur : " + (result.error || "Erreur inconnue"));
            if (result.s) document.getElementById('inpMLS').value = ''; 
        } catch (e) { alert("⚠️ Erreur : " + e.message); }
        if (btn) { btn.innerHTML = 'Demander'; btn.disabled = false; }
    }

    function toggleSection(id) { 
        const el = document.getElementById(id); 
        if (el) el.classList.toggle('collapsed'); 
    }
    
    // --- GESTION PWA ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        const btn = document.getElementById('btnInstallPWA');
        if (btn) btn.style.display = 'block';
    });

    const btnPWA = document.getElementById('btnInstallPWA');
    if (btnPWA) {
        btnPWA.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') { btnPWA.style.display = 'none'; }
            deferredPrompt = null;
        });
    }

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initPortal); } else { initPortal(); }
</script>
