<script>
    /**
     * PORTAL SCRIPTS v14.13 - FIX TIME DISPLAY & SYNC
     */
    const API_URL = 'https://evanpatruno-ca.vercel.app/api/portal';

    function initPortal() {
        const code = localStorage.getItem('portal_code');
        const phone = localStorage.getItem('portal_phone');
        if (code && phone) {
            handlePortalLogin();
        } else {
            const splash = document.getElementById('loadingSplash');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }
        }

        // Enregistrement du Service Worker pour le PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log("SW: Registered"))
                .catch(err => console.error("SW: Error", err));
        }
    }

    async function handlePortalLogin(e) {
        if (e && e.preventDefault) e.preventDefault();
        const inpCode = document.getElementById('inpPortalCode');
        const inpPhone = document.getElementById('inpPortalPhone');
        const btn = document.getElementById('btnPortalLogin');

        const code = (inpCode?.value || localStorage.getItem('portal_code'))?.trim().toUpperCase();
        const phone = (inpPhone?.value || localStorage.getItem('portal_phone'))?.trim();

        // On détermine si c'est une connexion manuelle (clic bouton)
        const isManual = !!(inpCode?.value || inpPhone?.value);

        if (!code || !phone) {
            if (e) alert("⚠️ Veuillez remplir votre Code Dossier et vos 4 chiffres de téléphone.");
            return;
        }


        if (btn) { btn.innerText = "Vérification..."; btn.disabled = true; }
        try {
            const res = await fetch(`${API_URL}?t=${Date.now()}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ codePortal: code, phoneLast4: phone }) });
            const data = await res.json();
            if (!res.ok) throw new Error((data.error || "Accès refusé."));

            if (data.s === false) throw new Error(data.message || "Erreur Zoho");

            localStorage.setItem('portal_code', code);
            localStorage.setItem('portal_phone', phone);
            localStorage.setItem('portal_deal_id', data.id);
            renderPortal(data);
            hapticFeedback('success');
            document.getElementById('portalOverlay').classList.add('hidden');
            document.getElementById('portalDash').classList.add('visible');
        } catch (error) {
            console.error("Login Error:", error);
            // On affiche l'alerte si c'est manuel OU si on force l'événement
            if (e || isManual) alert("⚠️ Erreur : " + error.message);

            const isDashVisible = document.getElementById('portalDash').classList.contains('visible');
            if (!isDashVisible) {
                document.getElementById('portalOverlay').classList.remove('hidden');
            }
            if (btn) { btn.innerText = "Ouvrir mon dossier"; btn.disabled = false; }
        } finally {
            if (btn) { btn.innerText = "Ouvrir mon dossier"; btn.disabled = false; }
            const splash = document.getElementById('loadingSplash');
            if(splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }
        }
    }

    function handleLogout() {
        if (!confirm("Voulez-vous vous déconnecter ?")) return;
        localStorage.removeItem('portal_code');
        localStorage.removeItem('portal_phone');
        localStorage.removeItem('portal_deal_id');
        location.reload();
    }

    function formatVisitDate(dt) {
        if (!dt) return "À venir";
        try {
            // Zoho envoie parfois "YYYY-MM-DD HH:mm:ss" au lieu de "YYYY-MM-DDTHH:mm:ss"
            const cleanDT = dt.replace(' ', 'T');
            const dateObj = new Date(cleanDT);
            if (isNaN(dateObj)) return dt; // Fallback si invalide
            const datePart = dateObj.toLocaleDateString('fr-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
            const timePart = dateObj.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
            return `${datePart} à ${timePart}`;
        } catch (e) { return dt; }
    }

    function renderPortal(data) {
        if (!data) return;
        const setT = (id, v) => { const el = document.getElementById(id); if (el) el.innerText = v || "--"; };
        setT('txtWelcome', `Bonjour ${data.firstName || 'Evan'}.`);
        setT('txtPropName', `${data.property || ''} - ${data.city || ''}`);
        setT('txtCodeRef', `#${data.code || ''}`);
        const s = (data.timeline || []).find(x => x.status === 'active') || (data.timeline || []).find(x => x.status === 'pending');
        setT('badgeStage', s ? s.label : "Dossier Actif");

        const nextCondition = (data.checklist || []).find(c => !c.done);
        setT('dashNextStep', nextCondition ? nextCondition.name : "Terminé !");
        const upcomingVisits = (data.visites || []).filter(v => v.statut === 'Confirmée' || v.statut === 'Prévue');
        setT('dashNextVisit', upcomingVisits.length > 0 ? formatVisitDate(upcomingVisits[0].Date_heure_de_visite) : "Aucun planifié");
        updateAppBadge(upcomingVisits.length);

        const safe = (fn) => { try { fn(); } catch (e) { console.warn(e); } };
        
        // Push notification banner
        if ("Notification" in window && Notification.permission === 'default') {
            const pushB = document.getElementById('pushBanner');
            if(pushB) pushB.style.display = 'flex';
        }
        safe(() => renderMilestones(data.milestones || {}));
        safe(() => renderTimeline(data.timeline || []));
        safe(() => renderVisites(data.visites || [], data.code));
        safe(() => renderChecklist(data.checklist || []));
        safe(() => renderTeam(data.team || []));
        safe(() => renderPartners(data.partners || []));
        checkUrlSection();
    }

    function renderMilestones(m) {
        const wrap = document.getElementById('wrapMilestones'); if (!wrap) return;
        const config = [
            { l: 'Financement', d: m.financing },
            { l: 'Inspection', d: m.inspection },
            { l: 'Conditions', d: m.others },
            { l: 'Signature', d: m.signature },
            { l: 'Occupation', d: m.occupation }
        ];
        wrap.innerHTML = config.map(ms => {
            const days = ms.d?.days;
            const done = ms.d?.done || (days !== null && days < 0);
            const neonStyle = done
                ? 'border-color:#2ecc71; box-shadow: 0 0 25px rgba(46,204,113,0.4), inset 0 0 15px rgba(46,204,113,0.05); background:rgba(46,204,113,0.05);'
                : '';
            const valColor = done ? '#2ecc71' : '#fff';
            const valDisplay = days !== null && days !== undefined ? (done ? '✓' : days) : '--';
            const unit = done ? 'COMPLÉTÉ' : 'JOURS';
            return `<div class="milestone-card" style="${neonStyle}">
                <div style="font-size:0.55rem; opacity:0.6; margin-bottom:8px; font-weight:800; color:${done ? '#2ecc71' : 'rgba(255,255,255,0.4)'}">${unit}</div>
                <div class="milestone-val" style="color:${valColor}; text-shadow:${done ? '0 0 20px rgba(46,204,113,0.6)' : 'none'}; font-size:2.4rem;">${valDisplay}</div>
                <div class="milestone-label" style="font-size:0.65rem; margin-top:5px; font-weight:800;">${ms.l}</div>
            </div>`;
        }).join('');
    }

    function renderTimeline(timeline) {
        const wrap = document.getElementById('wrapTimeline'); if (!wrap) return;
        wrap.querySelectorAll('.step-node:not(.timeline-progress-bar)').forEach(n => n.remove());
        let completed = 0;
        timeline.forEach(s => {
            const node = document.createElement('div'); node.className = `step-node ${s.status}`;
            node.innerHTML = `<div class="node-dot">${s.icon || '○'}</div><div style="font-size:0.8rem; font-weight:700; margin-top:12px; text-align:center;">${s.label}</div>`;
            wrap.appendChild(node);
            if (s.status === 'completed') completed++; if (s.status === 'active') completed += 0.5;
        });
        setTimeout(() => {
            const bar = document.getElementById('barProgress');
            const pct = timeline.length > 1 ? Math.max(0, ((completed - 1) / (timeline.length - 1)) * 100) : 0;
            if (bar) {
                if (window.innerWidth <= 768) { bar.style.height = `${pct * 0.8}%`; bar.style.width = '2px'; }
                else { bar.style.width = `${pct * 0.8}%`; bar.style.height = '2px'; }
            }
        }, 300);
    }

    function renderVisites(visites, portalCode) {
        const wrap = document.getElementById('wrapVisites');
        if (!wrap) return;
        if (!visites || visites.length === 0) {
            wrap.innerHTML = `<p style="text-align:center; opacity:0.5;">Aucune visite.</p>`;
            return;
        }

        const now = Date.now();
        const archivedStats = ['Annulée', 'Refusée', 'Terminée', 'Effectuée'];
        const activeVisites = visites.filter(v => !archivedStats.includes(v.statut));
        const archivedVisites = visites.filter(v => archivedStats.includes(v.statut));

        const statusColors = {
            'En attente': 'rgba(241, 196, 15, 0.2)',
            'Prévue': 'rgba(46, 204, 113, 0.2)',
            'Confirmée': 'rgba(46, 204, 113, 0.2)',
            'Terminée': 'rgba(52, 152, 219, 0.2)',
            'Effectuée': 'rgba(52, 152, 219, 0.2)',
            'Annulée': 'rgba(231, 76, 60, 0.2)',
            'Refusée': 'rgba(231, 76, 60, 0.2)'
        };
        const statusTextColors = {
            'En attente': '#f1c40f',
            'Prévue': '#2ecc71',
            'Confirmée': '#2ecc71',
            'Terminée': '#3498db',
            'Effectuée': '#3498db',
            'Annulée': '#e74c3c',
            'Refusée': '#e74c3c'
        };

        let html = activeVisites.map(v => {
            const localFB = JSON.parse(localStorage.getItem(`visit_fb_${portalCode}_${v.id}`) || "{}");
            const verdict = v.verdict || localFB.verdict || "";
            const rating = v.evaluation || localFB.rating || 0;
            const visitTime = v.Date_heure_de_visite ? new Date(v.Date_heure_de_visite.replace(' ', 'T')).getTime() : 0;
            const isUnlocked = now > (visitTime + 1800000);
            const isCompleted = ["Terminée", "Effectuée"].includes(v.statut);
            const safeLoc = (v.location || 'Lieu').split("'").join("\\'");

            const sCol = statusColors[v.statut] || 'rgba(255,255,255,0.1)';
            const sTxt = statusTextColors[v.statut] || '#fff';

            return `
                <div class="visit-card">
                    <div class="visit-header">
                        <div>
                            <div style="font-weight:900; color:#fff; font-size:1.1rem;">${formatVisitDate(v.Date_heure_de_visite)}</div>
                            <div style="font-size:0.85rem; color:var(--dash-accent);">📍 ${v.location || 'Lieu'}</div>
                        </div>
                        <div class="visit-badge" style="background:${sCol}; border:1px solid ${sTxt}33; padding:5px 12px; border-radius:8px; font-size:0.65rem; font-weight:800; color:${sTxt}; text-transform:uppercase;">
                            ${v.statut || 'En attente'}
                        </div>
                    </div>
                    
                    ${isUnlocked || isCompleted ? `
                        <div style="background:rgba(0,0,0,0.2); border-radius:15px; padding:15px; border:1px solid rgba(255,255,255,0.05);">
                            <div style="text-align:center; font-size:0.7rem; font-weight:800; color:var(--dash-accent); text-transform:uppercase; margin-bottom:5px;">Évaluation visite</div>
                            <div style="display:flex; gap:8px; justify-content:center; margin-bottom:15px;">
                                ${[1, 2, 3, 4, 5].map(s => `
                                    <span onclick="saveRating('${v.id}', ${s}, this)" style="cursor:pointer; font-size:1.5rem; filter:${s <= rating ? 'none' : 'grayscale(1) opacity(0.2)'}; transition:0.3s;">⭐</span>
                                `).join('')}
                            </div>

                            <div style="text-align:center; font-size:0.7rem; font-weight:800; color:var(--dash-accent); text-transform:uppercase; margin-bottom:10px;">Verdict visite</div>
                            <div style="display:flex; gap:15px; justify-content:center; margin-bottom:15px;">
                                <button onclick="saveVerdict('${v.id}', 'Coup de coeur', this)" style="background:${verdict === 'Coup de coeur' ? 'rgba(135,50,118,0.4)' : 'transparent'}; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:8px; cursor:pointer; font-size:1.4rem;">❤️</button>
                                <button onclick="saveVerdict('${v.id}', 'A réfléchir', this)" style="background:${verdict === 'A réfléchir' ? 'rgba(135,50,118,0.4)' : 'transparent'}; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:8px; cursor:pointer; font-size:1.4rem;">🤔</button>
                                <button onclick="saveVerdict('${v.id}', 'Pas intéressé', this)" style="background:${verdict === 'Pas intéressé' ? 'rgba(135,50,118,0.4)' : 'transparent'}; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:8px; cursor:pointer; font-size:1.4rem;">👎</button>
                            </div>

                            <textarea id="comm-${v.id}" placeholder="Vos commentaires sur cette propriété..." style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px; color:#fff; font-size:0.85rem; height:80px; margin-bottom:15px; outline:none; resize:none;">${v.commentaire || ""}</textarea>
                            
                            <button id="btn-sync-${v.id}" onclick="syncVisitFeedback('${v.id}')" style="width:100%; background:linear-gradient(135deg, #873276, #bb66ff); color:#fff; border:none; border-radius:12px; padding:12px; font-weight:800; font-size:0.8rem; cursor:pointer; text-transform:uppercase; transition:0.3s;">Synchroniser l'avis ✨</button>
                        </div>
                    ` : `
                        <div style="background:rgba(255,255,255,0.02); border-radius:15px; border:1px dashed rgba(255,255,255,0.1); padding:15px;">
                            <div style="text-align:center; font-size:0.75rem; color:rgba(255,255,255,0.4); margin-bottom:15px;">🔒 Formulaire d'avis disponible 30 min après la visite.</div>
                            <div style="display:flex; gap:10px;">
                                <button onclick="requestCancelVisit('${v.id}', '${safeLoc}', this)" style="flex:1; background:rgba(231, 76, 60, 0.1); border:1px solid rgba(231, 76, 60, 0.3); color:#e74c3c; padding:10px; border-radius:10px; font-size:0.75rem; font-weight:800; cursor:pointer; transition:0.3s;">🚫 Annuler</button>
                                <button onclick="requestRescheduleVisit('${v.id}', '${safeLoc}')" style="flex:1; background:rgba(212, 175, 55, 0.1); border:1px solid rgba(212, 175, 55, 0.3); color:#d4af37; padding:10px; border-radius:10px; font-size:0.75rem; font-weight:800; cursor:pointer; transition:0.3s;">⏳ Reporter</button>
                            </div>
                        </div>
                    `}
                </div>`;
        }).join('');

        if (archivedVisites.length > 0) {
            html += `
                <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
                    <div onclick="toggleSection('wrapArchivedVisits')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between; opacity:0.6; padding:10px;">
                        <span style="font-size:0.8rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;">📁 Visites annulées / refusées (${archivedVisites.length})</span>
                        <span style="font-size:0.8rem;">▼</span>
                    </div>
                    <div id="wrapArchivedVisits" class="collapsed" style="margin-top:15px; flex-direction:column; gap:10px;">
                        ${archivedVisites.map(v => {
                const arcCol = statusColors[v.statut] || 'rgba(255,255,255,0.1)';
                const arcTxt = statusTextColors[v.statut] || '#fff';
                return `
                                <div style="background:rgba(255,255,255,0.02); border-radius:15px; padding:12px; border:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center; opacity:0.8;">
                                    <div style="font-size:0.8rem;">
                                        <div style="font-weight:700; color:#fff;">${formatVisitDate(v.Date_heure_de_visite)}</div>
                                        <div style="font-size:0.7rem; color:var(--dash-accent);">📍 ${v.location || 'Lieu'}</div>
                                    </div>
                                    <div style="font-size:0.55rem; background:${arcCol}; color:${arcTxt}; border:1px solid ${arcTxt}33; padding:4px 8px; border-radius:5px; text-transform:uppercase; font-weight:800;">${v.statut}</div>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `;
        }


        wrap.innerHTML = html;
    }

    function updateLocalFB(id, key, val) {
        const code = localStorage.getItem('portal_code');
        const storageKey = `visit_fb_${code}_${id}`;
        const fb = JSON.parse(localStorage.getItem(storageKey) || "{}");
        fb[key] = val; localStorage.setItem(storageKey, JSON.stringify(fb));
    }

    function saveRating(id, r, el) {
        updateLocalFB(id, 'rating', r);
        const stars = el.parentElement.querySelectorAll('span');
        stars.forEach((s, idx) => s.style.filter = (idx < r) ? 'none' : 'grayscale(1) opacity(0.2)');
    }

    function saveVerdict(id, v, btn) {
        updateLocalFB(id, 'verdict', v);
        btn.parentElement.querySelectorAll('button').forEach(b => b.style.background = 'transparent');
        btn.style.background = 'rgba(135, 50, 118, 0.4)';
    }

    async function syncVisitFeedback(id) {
        const code = localStorage.getItem('portal_code'), dealId = localStorage.getItem('portal_deal_id'), btn = document.getElementById(`btn-sync-${id}`);
        const comm = document.getElementById(`comm-${id}`).value;
        const localFB = JSON.parse(localStorage.getItem(`visit_fb_${code}_${id}`) || "{}");
        if (!dealId || !btn) return;
        btn.innerText = "Sync..."; btn.disabled = true;
        try {
            const payload = {
                codePortal: code,
                dealId: dealId,
                visitId: id,
                evaluation: String(localFB.rating || 5),
                verdict: localFB.verdict || "A réfléchir",
                commentaire: comm
            };
            const res = await fetch(`${API_URL}?action=pushAvisV13`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.s) { btn.innerText = "Avis enregistré ! ✨"; btn.style.background = "#2ecc71"; }
            else { throw new Error((result.error || "Erreur API") + (result.details ? ": " + JSON.stringify(result.details).substring(0, 100) : "")); }
        } catch (e) { btn.innerText = "Réessayer"; btn.disabled = false; alert("⚠️ Erreur avis : " + e.message); console.error("Sync Error:", e); }
    }

    function getZohoDateTime(dtString) {
        if (!dtString) return null;
        const d = new Date(dtString);
        return d.toISOString().split('.')[0] + '+00:00';
    }

    async function requestVisit() {
        hapticFeedback('medium');
        const loc = document.getElementById('inpVisitLoc').value.trim();
        const dt = document.getElementById('inpVisitDateTime').value;
        const d = localStorage.getItem('portal_deal_id');
        const c = localStorage.getItem('portal_code');
        if (!loc || !dt) { alert("Veuillez remplir l'adresse et la date."); return; }

        // Validation : Minimum 2h dans le futur
        const chosen = new Date(dt).getTime();
        const minTime = Date.now() + (2 * 60 * 60 * 1000);
        if (chosen < minTime) {
            alert("⚠️ Délai trop court : Veuillez choisir un horaire au moins 2 heures dans le futur.");
            return;
        }

        const btn = document.querySelector('[onclick="requestVisit()"]');
        if (btn) { btn.innerText = "Envoi..."; btn.disabled = true; }
        try {
            const res = await fetch(`${API_URL}?action=requestVisit`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'requestVisit', codePortal: c, dealId: d, location: loc, dateTime: getZohoDateTime(dt) }) });
            const result = await res.json();
            if (result.s) {
                hapticFeedback('success');
                alert("✅ Demande de visite envoyée ! Evan vous contactera pour confirmer.");
                document.getElementById('inpVisitLoc').value = '';
                document.getElementById('inpVisitDateTime').value = '';

                // Un seul rafraîchissement après 3s pour laisser Zoho indexer le nouveau record
                setTimeout(() => { handlePortalLogin(); }, 3000);
            } else {
                alert("⚠️ Erreur : " + (result.details || result.error || "Erreur inconnue"));
            }
        } catch (e) { alert("⚠️ Erreur de connexion : " + e.message); }
        if (btn) { btn.innerText = "Envoyer la demande"; btn.disabled = false; }
    }

    async function requestCancelVisit(id, loc, btn) {
        if (!confirm(`Voulez-vous vraiment annuler la visite pour : ${loc} ?`)) return;
        if (btn) { btn.innerText = "Annulation..."; btn.disabled = true; }
        const c = localStorage.getItem('portal_code'), d = localStorage.getItem('portal_deal_id');
        try {
            const res = await fetch(`${API_URL}?action=cancelVisit`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ codePortal: c, dealId: d, visitId: id, location: loc }) });
            const result = await res.json();
            if (result.s) {
                alert("✅ Visite annulée avec succès.");
                handlePortalLogin();
            } else {
                alert("⚠️ Erreur : " + (result.error || "Inconnue") + "\n" + (result.message || ""));
                if (btn) { btn.innerText = "🚫 Annuler"; btn.disabled = false; }
            }
        } catch (e) {
            alert("⚠️ Erreur de connexion : " + e.message);
            if (btn) { btn.innerText = "🚫 Annuler"; btn.disabled = false; }
        }
    }

    function requestRescheduleVisit(id, loc) {
        const overlay = document.createElement('div');
        overlay.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:200000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);";
        overlay.innerHTML = `
            <div style="background:#1a0b16; border:1px solid rgba(255,255,255,0.1); padding:30px; border-radius:25px; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.5);">
                <div style="font-size:2rem; margin-bottom:15px;">⏳</div>
                <h3 style="color:#fff; margin-bottom:10px; font-family:'Outfit';">Reporter la visite</h3>
                <p style="color:rgba(255,255,255,0.6); font-size:0.85rem; margin-bottom:25px;">Choisissez votre nouvel horaire pour :<br><b>${loc}</b></p>
                <input type="datetime-local" id="newVisitTime" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:15px; border-radius:12px; color:#fff; margin-bottom:20px; outline:none; font-family:inherit;">
                <button id="btnConfirmReschedule" style="width:100%; background:var(--dash-grad); color:#fff; border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer; margin-bottom:10px;">CONFIRMER LE REPORT</button>
                <button id="btnCancelReschedule" style="width:100%; background:transparent; color:rgba(255,255,255,0.4); border:none; padding:10px; cursor:pointer; text-decoration:underline; font-size:0.8rem;">Annuler</button>
            </div>
        `;
        document.body.appendChild(overlay);

        document.getElementById('btnCancelReschedule').onclick = () => overlay.remove();
        document.getElementById('btnConfirmReschedule').onclick = async () => {
            const newDT = document.getElementById('newVisitTime').value;
            if (!newDT) { alert("Veuillez sélectionner une date et une heure."); return; }

            // Validation : Minimum 2h dans le futur
            const chosen = new Date(newDT).getTime();
            const minTime = Date.now() + (2 * 60 * 60 * 1000);
            if (chosen < minTime) {
                alert("⚠️ Délai trop court : Veuillez choisir un horaire au moins 2 heures dans le futur.");
                return;
            }

            const btn = document.getElementById('btnConfirmReschedule');
            btn.innerText = "Mise à jour..."; btn.disabled = true;

            const c = localStorage.getItem('portal_code'), d = localStorage.getItem('portal_deal_id');
            try {
                const res = await fetch('https://evanpatruno-ca.vercel.app/api/portal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'rescheduleVisit', codePortal: c, dealId: d, visitId: id, location: loc, newDateTime: getZohoDateTime(newDT) }) });
                const result = await res.json();
                if (result.s) {
                    alert("✅ Visite reportée ! Evan a été notifié.");
                    handlePortalLogin();
                } else {
                    alert("⚠️ Erreur : " + (result.error || "Inconnue") + "\n" + (result.message || ""));
                }
            } catch (e) { alert("⚠️ Erreur de connexion : " + e.message); }
            overlay.remove();
        };
    }

    function hapticFeedback(style = 'light') {
        if (!window.navigator || !window.navigator.vibrate) return;
        try {
            if (style === 'light') window.navigator.vibrate(10);
            else if (style === 'medium') window.navigator.vibrate(25);
            else if (style === 'success') window.navigator.vibrate([15, 30, 15]);
        } catch(e) {}
    }

    function updateAppBadge(count) {
        if ('setAppBadge' in navigator) {
            if (count > 0) navigator.setAppBadge(count).catch(() => {});
            else navigator.clearAppBadge().catch(() => {});
        }
    }

    function checkUrlSection() {
        const params = new URLSearchParams(window.location.search);
        const section = params.get('section');
        if (section) {
            // On attend que l'animation d'apparition du dashboard soit finie
            setTimeout(() => {
                const el = document.getElementById(section);
                if (el) {
                    toggleSection(section, true);
                    // On force un scroll un peu plus tard pour être sûr
                    setTimeout(() => {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 500);
                    // On nettoie l'URL
                    const newUrl = window.location.pathname;
                    window.history.replaceState({}, document.title, newUrl);
                }
            }, 1200);
        }
    }

    async function nativeShare() {
        hapticFeedback('medium');
        const shareData = {
            title: 'Evan Patruno | Courtier Immobilier',
            text: 'Accédez à votre portail client privé ou recommandez les services de Evan Patruno.',
            url: 'https://evanpatruno.ca/mon-dossier'
        };
        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                await navigator.clipboard.writeText(shareData.url);
                alert("📋 Lien de partage copié !");
            }
        } catch (err) {
            console.log('Share error:', err);
        }
    }

    function toggleSection(id, forceOpen = false) {
        hapticFeedback('light');
        const el = document.getElementById(id); if (!el) return;
        if (forceOpen) el.classList.remove('collapsed');
        else el.classList.toggle('collapsed');
        if (forceOpen || !el.classList.contains('collapsed')) {
            setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }
    }

    let deferredPrompt;
    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

    function showPwaToast(msg) {
        const existing = document.getElementById('pwaToast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'pwaToast';
        toast.style.cssText = "position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(20,8,18,0.96); color:#fff; border:1px solid rgba(135,50,118,0.6); box-shadow:0 0 30px rgba(135,50,118,0.3); padding:14px 24px; border-radius:50px; font-family:'Outfit',sans-serif; fontSize:0.85rem; fontWeight:600; zIndex:20000; textAlign:center; maxWidth:90vw;";
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }

    const setupInstallBtn = () => {
        const btn = document.getElementById('btnInstallPWA');
        if (!btn) return;

        if (isInStandaloneMode()) {
            btn.style.display = 'none';
            return;
        }

        btn.addEventListener('click', async (e) => {
            e.preventDefault();
            const code = localStorage.getItem('portal_code') || "";

            // Si on est déjà sur le domaine Vercel (PWA)
            if (window.location.hostname.includes('vercel.app') || window.location.hostname.includes('dossier.evanpatruno.ca')) {
                if (isIos()) {
                    showPwaToast("🍎 Sur iPhone : Touchez <b>Partager</b> (en bas), puis <b>Sur l'écran d'accueil</b>.");
                    return;
                }
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') btn.style.display = 'none';
                    deferredPrompt = null;
                } else {
                    showPwaToast("💡 Ouvrez le menu de votre navigateur et choisissez 'Installer l'application'.");
                }
            } else {
                // Si on est sur Zoho, on redirige vers le domaine d'installation
                const installUrl = `https://evanpatruno-ca.vercel.app/mon-dossier.html?action=install&code=${code}`;
                window.location.href = installUrl;
            }
        });
    };

    const checkAutoInstall = () => {

            const icon = document.createElement('div');

            icon.textContent = "📲";
            
            const title = document.createElement('h2');
            title.style.cssText = "font-size:2rem;margin-bottom:10px;";
            title.textContent = "Installer l'App";
            
            const desc = document.createElement('p');
            desc.style.cssText = "opacity:0.7;margin-bottom:40px;";
            desc.textContent = "Confirmez l'installation pour accéder à votre dossier en un clic depuis votre écran d'accueil.";
            
            const btnFinalInstall = document.createElement('button');
            btnFinalInstall.style.cssText = "background:linear-gradient(135deg, #873276, #b0549c);border:none;color:#fff;padding:18px 40px;font-size:1.1rem;font-weight:900;border-radius:50px;box-shadow:0 10px 30px rgba(135,50,118,0.5);cursor:pointer;";
            btnFinalInstall.textContent = "INSTALLER MAINTENANT";
            
            const btnCancelInstall = document.createElement('button');
            btnCancelInstall.style.cssText = "background:transparent;border:none;color:#fff;opacity:0.4;margin-top:25px;text-decoration:underline;cursor:pointer;";
            btnCancelInstall.textContent = "Plus tard";
            
            overlay.appendChild(icon);
            overlay.appendChild(title);
            overlay.appendChild(desc);
            overlay.appendChild(btnFinalInstall);
            overlay.appendChild(btnCancelInstall);
            document.body.appendChild(overlay);

            btnCancelInstall.onclick = () => overlay.remove();
            btnFinalInstall.onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') overlay.remove();
                    deferredPrompt = null;
                } else if (isIos()) {
                    overlay.remove();
                    showPwaToast("🍎 Touchez Partager puis Sur l'écran d'accueil.");
                } else {
                    overlay.remove();
                    showPwaToast("💡 Utilisez le menu du navigateur pour installer.");
                }
            };
        }
    };

    // Initialisation
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            initPortal();
            setupInstallBtn();
            checkAutoInstall();
        });
    } else {
        initPortal();
        setupInstallBtn();
        checkAutoInstall();
    }
