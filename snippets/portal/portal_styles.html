<style>
    /* --- PORTAL STYLES v15.0 - FULL VISUAL UPGRADE --- */
    * { box-sizing: border-box !important; }
    :root {
        --dash-primary: #873276;
        --dash-primary-glow: rgba(135, 50, 118, 0.4);
        --dash-accent: #d4af37;
        --dash-accent-glow: rgba(212, 175, 55, 0.4);
        --dash-bg: #0f050d;
        --dash-card-bg: rgba(255, 255, 255, 0.03);
        --dash-border: rgba(135, 50, 118, 0.5);
        --dash-glow: 0 0 30px rgba(135, 50, 118, 0.3);
        --dash-grad: linear-gradient(135deg, #873276 0%, #b0549c 100%);
        --green: #2ecc71;
        --red: #e74c3c;
        --yellow: #f39c12;
    }

    .portal-main-wrapper {
        font-family: 'Inter', sans-serif;
        color: #fff;
        background: var(--dash-bg);
        min-height: 900px;
        position: relative;
        overflow: hidden;
        border-radius: 50px;
        border: 1px solid var(--dash-border);
        box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8);
        margin: 20px 0;
    }

    .portal-aura {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 30% 30%, rgba(135, 50, 118, 0.15) 0%, transparent 70%),
                    radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
        z-index: 0; pointer-events: none;
    }

    .portal-container {
        display: none;
        max-width: 1100px;
        margin: 0 auto;
        padding: 60px 25px;
        position: relative;
        z-index: 10;
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .portal-container.visible { display: block; opacity: 1; transform: translateY(0); }

    /* SECTIONS & COLLAPSE */
    .section-wrapper {
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 35px;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
        overflow: hidden;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .section-wrapper:hover { border-color: var(--dash-border); box-shadow: var(--dash-glow); }

    .section-header {
        padding: 22px 30px;
        display: flex; justify-content: space-between; align-items: center;
        cursor: pointer; background: rgba(255, 255, 255, 0.02);
        user-select: none;
    }
    .section-header h3 { 
        color: #fff !important; margin: 0; font-family: 'Outfit'; font-size: 1.5rem; font-weight: 700;
        letter-spacing: -0.02em;
    }
    .section-chevron { 
        color: var(--dash-primary); font-size: 0.9rem; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        background: rgba(135, 50, 118, 0.1); width: 32px; height: 32px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .section-content { 
        padding: 30px; 
        max-height: 2000px;
        transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1), padding 0.3s ease, opacity 0.3s ease;
        opacity: 1;
    }
    .section-wrapper.collapsed .section-content { 
        max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0; overflow: hidden;
    }
    .section-wrapper.collapsed .section-chevron { transform: rotate(-90deg); }

    /* MILESTONES */
    .milestone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
    .milestone-card { 
        background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); 
        border-radius: 35px; padding: 30px 20px; text-align: center; transition: 0.3s;
        position: relative; overflow: hidden;
    }
    .milestone-card:hover { transform: translateY(-5px); border-color: var(--dash-border); background: rgba(135, 50, 118, 0.05); }
    .milestone-val { font-family: 'Outfit'; font-size: 2.5rem; font-weight: 900; color: #fff; margin-bottom: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
    .milestone-val.empty { font-size: 1rem; color: rgba(255,255,255,0.25); font-weight: 600; }
    .milestone-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: var(--dash-accent); letter-spacing: 1px; }
    .milestone-badge { font-size: 0.55rem; color: rgba(255,255,255,0.3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* TIMELINE */
    .timeline-steps { display: flex; justify-content: space-between; position: relative; padding: 30px 50px; }
    .timeline-steps::before { content: ''; position: absolute; top: 57px; left: 10%; width: 80%; height: 3px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
    .timeline-progress-bar { position: absolute; top: 57px; left: 10%; height: 3px; width: 0; background: linear-gradient(90deg, #2ecc71, #a8e6cf); box-shadow: 0 0 20px #2ecc71; transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 10px; }
    .step-node { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 5; width: 120px; }
    .node-dot { 
        width: 60px; height: 60px; border-radius: 50%; background: #0f050d; 
        border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; 
        font-size: 1.2rem; transition: all 0.5s ease; 
    }
    .step-node.completed .node-dot { border-color: #2ecc71; color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
    .step-node.active .node-dot { border-color: var(--dash-primary); color: #fff; box-shadow: 0 0 30px var(--dash-primary-glow); transform: scale(1.15); background: var(--dash-grad); animation: pulse-node 2s infinite; }
    @keyframes pulse-node { 0%,100% { box-shadow: 0 0 20px var(--dash-primary-glow); } 50% { box-shadow: 0 0 40px rgba(135,50,118,0.7); } }

    /* VISIT CARDS */
    .visit-card { 
        background: rgba(255,255,255,0.03); border: 1px solid rgba(135,50,118,0.25); 
        border-radius: 25px; padding: 25px; margin-bottom: 15px;
        transition: border-color 0.3s, box-shadow 0.3s;
        animation: fadeInUp 0.4s ease both;
    }
    .visit-card:hover { border-color: rgba(135,50,118,0.5); box-shadow: 0 8px 30px rgba(135,50,118,0.1); }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

    /* STATUS BADGES */
    .status-badge {
        padding: 5px 14px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-confirme { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .status-annule { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
    .status-attente { background: rgba(243,156,18,0.15); color: #f39c12; border: 1px solid rgba(243,156,18,0.3); animation: pulse-badge 2s infinite; }
    @keyframes pulse-badge { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

    /* STAR RATING */
    .star-btn { 
        cursor: pointer; font-size: 1.6rem; transition: transform 0.2s, filter 0.2s;
        background: none; border: none; padding: 2px; line-height: 1;
    }
    .star-btn:hover { transform: scale(1.3); }
    .star-btn.active { filter: none; }
    .star-btn.inactive { filter: grayscale(1) opacity(0.25); }

    /* VERDICT BUTTONS */
    .verdict-btn {
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        background: transparent; border: 1px solid rgba(255,255,255,0.1); 
        border-radius: 16px; padding: 12px 18px; cursor: pointer; 
        transition: all 0.25s ease; min-width: 90px;
    }
    .verdict-btn:hover { transform: translateY(-3px); border-color: rgba(135,50,118,0.5); background: rgba(135,50,118,0.1); }
    .verdict-btn.selected { background: rgba(135,50,118,0.35); border-color: var(--dash-primary); box-shadow: 0 0 15px rgba(135,50,118,0.3); }
    .verdict-btn span.emoji { font-size: 1.5rem; }
    .verdict-btn span.label { font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; white-space: nowrap; }

    /* FEEDBACK FORM */
    .feedback-zone {
        background: rgba(0,0,0,0.25); border-radius: 20px; padding: 20px;
        border: 1px solid rgba(255,255,255,0.05);
        margin-top: 15px;
    }
    .feedback-label {
        text-align: center; font-size: 0.65rem; font-weight: 900; color: var(--dash-accent);
        text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
    }
    .feedback-textarea {
        width: 100%; min-height: 80px; background: rgba(0,0,0,0.3); color: #fff; 
        border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; 
        font-size: 0.85rem; font-family: 'Inter', sans-serif;
        margin-bottom: 15px; outline: none; resize: vertical;
        transition: border-color 0.2s;
    }
    .feedback-textarea:focus { border-color: rgba(135,50,118,0.5); }
    .submit-avis-btn {
        width: 100%; padding: 16px; border-radius: 14px; 
        background: var(--dash-grad); color: #fff; border: none; 
        font-weight: 800; cursor: pointer; font-size: 0.9rem;
        letter-spacing: 0.5px; transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(135,50,118,0.3);
    }
    .submit-avis-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(135,50,118,0.5); }
    .submit-avis-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .submit-avis-btn.success { background: linear-gradient(135deg, #1a8a4a, #2ecc71); box-shadow: 0 5px 20px rgba(46,204,113,0.3); }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 50px 20px; opacity: 0.6; }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 15px; }
    .empty-state p { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin: 0; }

    /* VISIT REQUEST FORM */
    .visit-request-form {
        background: rgba(255,255,255,0.02); border: 1px dashed rgba(135,50,118,0.4);
        border-radius: 20px; padding: 20px; margin-bottom: 20px;
    }
    .visit-request-form h4 { margin: 0 0 15px; color: #fff; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    .portal-input {
        width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
        padding: 13px 16px; border-radius: 12px; color: #fff; outline: none;
        font-size: 0.85rem; transition: border-color 0.2s;
        color-scheme: dark;
    }
    .portal-input:focus { border-color: rgba(135,50,118,0.5); }

    /* TEAM CARDS */
    .team-card {
        background: rgba(255,255,255,0.03); padding: 20px; border-radius: 22px;
        border: 1px solid rgba(255,255,255,0.08); text-align: center;
        transition: 0.3s ease;
    }
    .team-card:hover { border-color: rgba(135,50,118,0.4); transform: translateY(-3px); }
    .team-card .team-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
    .team-action-btn {
        flex: 1; padding: 8px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.7); cursor: pointer;
        font-size: 0.7rem; font-weight: 700; transition: 0.2s; text-decoration: none;
        display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .team-action-btn:hover { background: rgba(135,50,118,0.2); border-color: var(--dash-primary); color: #fff; }

    /* OVERLAY */
    .portal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 5, 13, 0.98); backdrop-filter: blur(40px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .portal-overlay.hidden { display: none; }
    .login-card { 
        background: rgba(255, 255, 255, 0.03); padding: 60px; border-radius: 50px; 
        border: 1px solid var(--dash-border); text-align: center; width: 450px;
        box-shadow: 0 30px 100px rgba(0,0,0,0.5);
    }

    /* BUTTONS */
    .login-btn, .action-btn { 
        width: 100%; padding: 22px; background: var(--dash-grad); color: #fff; 
        border: none; border-radius: 50px; font-weight: 800; cursor: pointer; 
        text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;
        transition: 0.3s; box-shadow: 0 10px 30px rgba(135, 50, 118, 0.3);
    }
    .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(135, 50, 118, 0.5); }

    @media (max-width: 768px) {
        .portal-main-wrapper { border-radius: 40px; margin: 10px 5px; }
        .timeline-steps { flex-direction: column; padding: 0 30px; gap: 40px; }
        .timeline-steps::before { left: 59px; width: 3px; height: 75%; top: 12%; }
        .timeline-progress-bar { left: 59px; width: 3px !important; top: 12%; height: 0; transition: height 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .step-node { flex-direction: row; width: 100%; gap: 30px; padding: 0; align-items: center; }
        .verdict-btn { min-width: 75px; padding: 10px 12px; }
    }
</style>
